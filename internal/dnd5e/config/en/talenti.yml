- entries:
  - When you use your action to {@action Dash}, you can use a bonus action to make
    one melee weapon attack or to {@action shove} a creature.
  - If you move at least 10 feet in a straight line immediately before taking this
    bonus action, you either gain a +5 bonus to the attack's damage roll (if you chose
    to make a melee attack and hit) or push the target up to 10 feet away from you
    (if you chose to shove and you succeed).
  name: Charger
  page: 165
  reprintedAs:
  - Charger|XPHB
  source: PHB
- ability:
  - choose:
      from:
      - str
      - dex
  category: G
  entries:
  - You gain the following benefits.
  - entries:
    - When you take the {@action Dash|XPHB} action, your {@variantrule Speed|XPHB}
      increases by 10 feet for that action.
    name: Improved Dash
    type: entries
  - entries:
    - 'If you move at least 10 feet in a straight line toward a target immediately
      before hitting it with a melee attack roll as part of the {@action Attack|XPHB}
      action, choose one of the following effects: gain a {@dice 1d8} bonus to the
      attack''s damage roll, or push the target up to 10 feet away if it is no more
      than one size larger than you. You can use this benefit only once on each of
      your turns.'
    name: Charge Attack
    type: entries
  name: Charger
  page: 202
  prerequisite:
  - ability:
    - str: 13
    level: 4
  - ability:
    - dex: 13
    level: 4
  source: XPHB
- ability:
  - choose:
      from:
      - con
      - wis
  category: G
  entries:
  - You gain the following benefits.
  - entries:
    - You gain proficiency with {@item Cook's Utensils|XPHB} if you don't already
      have it.
    name: Cook's Utensils
    type: entries
  - entries:
    - As part of a {@variantrule Short Rest|XPHB}, you can cook special food if you
      have ingredients and {@item Cook's Utensils|XPHB} on hand. You can prepare enough
      of this food for a number of creatures equal to 4 plus your {@variantrule Proficiency|XPHB|Proficiency
      Bonus}. At the end of the {@variantrule Short Rest|XPHB}, any creature who eats
      the food and spends one or more Hit Dice to regain {@variantrule Hit Points|XPHB}
      regains an extra {@dice 1d8} {@variantrule Hit Points|XPHB}.
    name: Replenishing Meal
    type: entries
  - entries:
    - With 1 hour of work or when you finish a {@variantrule Long Rest|XPHB}, you
      can cook a number of treats equal to your {@variantrule Proficiency|XPHB|Proficiency
      Bonus} if you have ingredients and {@item Cook's Utensils|XPHB} on hand. These
      special treats last 8 hours after being made. A creature can use a {@variantrule
      Bonus Action|XPHB} to eat one of those treats to gain a number of {@variantrule
      Temporary Hit Points|XPHB} equal to your {@variantrule Proficiency|XPHB|Proficiency
      Bonus}.
    name: Bolstering Treats
    type: entries
  name: Chef
  page: 202
  prerequisite:
  - level: 4
  source: XPHB
