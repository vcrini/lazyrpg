- ability:
  - cha: 1
  entries:
  - 'Skilled at mimicry and dramatics, you gain the following benefits:'
  - items:
    - You have advantage on Charisma ({@skill Deception}) and Charisma ({@skill Performance})
      checks when trying to pass yourself off as a different person.
    - You can mimic the speech of another person or the sounds made by other creatures.
      You must have heard the person speaking, or heard the creature make the sound,
      for at least 1 minute. A successful Wisdom ({@skill Insight}) check contested
      by your Charisma ({@skill Deception}) check allows a listener to determine that
      the effect is faked.
    type: list
  name: Actor
  page: 165
  reprintedAs:
  - Actor|XPHB
  source: PHB
- ability:
  - cha: 1
  category: G
  entries:
  - You gain the following benefits.
  - entries:
    - While you're disguised as a real or fictional person, you have {@variantrule
      Advantage|XPHB} on Charisma ({@skill Deception|XPHB} or {@skill Performance|XPHB})
      checks to convince others that you are that person.
    name: Impersonation
    type: entries
  - entries:
    - You can mimic the sounds of other creatures, including speech. A creature that
      hears the mimicry must succeed on a Wisdom ({@skill Insight|XPHB}) check to
      determine the effect is faked ({@dc 8} plus your Charisma modifier and {@variantrule
      Proficiency|XPHB|Proficiency Bonus}).
    name: Mimicry
    type: entries
  name: Actor
  page: 202
  prerequisite:
  - ability:
    - cha: 13
    level: 4
  source: XPHB
- entries:
  - 'Always on the lookout for danger, you gain the following benefits:'
  - items:
    - You gain a +5 bonus to initiative.
    - You can't be {@status surprised} while you are conscious.
    - Other creatures don't gain advantage on attack rolls against you as a result
      of being unseen by you.
    type: list
  name: Alert
