- entries:
  - 'Thanks to extensive practice with the crossbow, you gain the following benefits:'
  - items:
    - You ignore the loading quality of crossbows with which you are proficient.
    - Being within 5 feet of a hostile creature doesn't impose disadvantage on your
      ranged attack rolls.
    - When you use the {@action Attack} action and attack with a one-handed weapon,
      you can use a bonus action to attack with a {@item hand crossbow|phb} you are
      holding.
    type: list
  name: Crossbow Expert
  page: 165
  reprintedAs:
  - Crossbow Expert|XPHB
  source: PHB
- ability:
  - dex: 1
  category: G
  entries:
  - You gain the following benefits.
  - entries:
    - You ignore the {@itemProperty LD|XPHB|Loading} property of the {@item Hand Crossbow|XPHB},
      {@item Heavy Crossbow|XPHB}, and {@item Light Crossbow|XPHB} (all called crossbows
      elsewhere in this feat). If you're holding one of them, you can load a piece
      of ammunition into it even if you lack a free hand.
    name: Ignore Loading
    type: entries
  - entries:
    - Being within 5 feet of an enemy doesn't impose {@variantrule Disadvantage|XPHB}
      on your attack rolls with crossbows.
    name: Firing in Melee
    type: entries
  - entries:
    - When you make the extra attack of the {@itemProperty L|XPHB|Light} property,
      you can add your ability modifier to the damage of the extra attack if that
      attack is with a crossbow that has the {@itemProperty L|XPHB|Light} property
      and you aren't already adding that modifier to the damage.
    name: Dual Wielding
    type: entries
  name: Crossbow Expert
  page: 203
  prerequisite:
  - ability:
    - dex: 13
    level: 4
  source: XPHB
- ability:
  - choose:
      from:
      - str
      - con
  category: G
  entries:
  - You gain the following benefits.
  - entries:
    - Once per turn, when you hit a creature with an attack that deals Bludgeoning
      damage, you can move it 5 feet to an unoccupied space if the target is no more
      than one size larger than you.
    name: Push
    type: entries
  - entries:
    - When you score a {@variantrule Critical Hit|XPHB} that deals Bludgeoning damage
      to a creature, attack rolls against that creature have {@variantrule Advantage|XPHB}
      until the start of your next turn.
    name: Enhanced Critical
    type: entries
  name: Crusher
  page: 203
  prerequisite:
  - level: 4
  source: XPHB
