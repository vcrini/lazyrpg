    them.
  - 'When you choose this feat, you acquire a ritual book holding two 1st-level spells
    of your choice. Choose one of the following classes: {@filter bard|spells|level=1|class=bard|components
    & miscellaneous=ritual}, {@filter cleric|spells|level=1|class=cleric|components
    & miscellaneous=ritual}, {@filter druid|spells|level=1|class=druid|components
