  entries:
  - You gain the following benefits.
  - entries:
    - 'You gain {@variantrule Resistance|XPHB} to two of the following damage types
      of your choice: Acid, Cold, Fire, Lightning, Necrotic, Poison, Psychic, Radiant,
      or Thunder. Whenever you finish a {@variantrule Long Rest|XPHB}, you can change
      your choices.'
    name: Energy Resistances
    type: entries
  - entries:
    - When you take damage of one of the types chosen for the Energy Resistances benefit,
      you can take a {@variantrule Reaction|XPHB} to direct damage of the same type
      toward another creature you can see within 60 feet of yourself that isn't behind
      {@variantrule Cover|XPHB|Total Cover}. If you do so, that creature must succeed
      on a Dexterity saving throw ({@dc 8} plus your Constitution modifier and {@variantrule
      Proficiency|XPHB|Proficiency Bonus}) or take damage equal to {@dice 2d12} plus
      your Constitution modifier.
    name: Energy Redirection
