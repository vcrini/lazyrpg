  entries:
  - entries:
    - Young dragonborn grow quickly. They walk hours after hatching, attain the size
      and development of a 10-year-old human child by the age of 3, and reach adulthood
      by 15. They live to be around 80.
    name: Age
    type: entries
  - entries:
    - Dragonborn are taller and heavier than humans, standing well over 6 feet tall
      and averaging almost 250 pounds. Your size is Medium.
    name: Size
    type: entries
  - entries:
    - You have draconic ancestry. Choose one type of dragon from the Draconic Ancestry
      table. Your breath weapon and damage resistance are determined by the dragon
      type, as shown in the table.
    - caption: Draconic Ancestry
      colLabels:
      - Dragon
      - Damage Type
      - Breath Weapon
      colStyles:
      - col-3 text-center
      - col-3 text-center
      - col-6
      rows:
      - - Black
        - Acid
        - 5 by 30 ft. line (Dex. save)
      - - Blue
        - Lightning
        - 5 by 30 ft. line (Dex. save)
      - - Brass
        - Fire
        - 5 by 30 ft. line (Dex. save)
      - - Bronze
        - Lightning
        - 5 by 30 ft. line (Dex. save)
      - - Copper
        - Acid
        - 5 by 30 ft. line (Dex. save)
      - - Gold
        - Fire
        - 15 ft. cone (Dex. save)
      - - Green
        - Poison
        - 15 ft. cone (Con. save)
      - - Red
        - Fire
        - 15 ft. cone (Dex. save)
      - - Silver
        - Cold
        - 15 ft. cone (Con. save)
      - - White
        - Cold
        - 15 ft. cone (Con. save)
      type: table
    name: Draconic Ancestry
    type: entries
  - entries:
    - You can use your action to exhale destructive energy. Your draconic ancestry
      determines the size, shape, and damage type of the exhalation.
    - When you use your breath weapon, each creature in the area of the exhalation
      must make a saving throw, the type of which is determined by your draconic ancestry.
      The DC for this saving throw equals 8 + your Constitution modifier + your proficiency
      bonus. A creature takes {@damage 2d6} damage on a failed save, and half as much
      damage on a successful one. The damage increases to {@damage 3d6} at 6th level,
      {@damage 4d6} at 11th level, and {@damage 5d6} at 16th level.
    - After you use your breath weapon, you can't use it again until you complete
      a short or long rest.
    name: Breath Weapon
    type: entries
  - entries:
    - You have resistance to the damage type associated with your draconic ancestry.
    name: Damage Resistance
    type: entries
  - entries:
    - You can speak, read, and write Common and Draconic. Draconic is thought to be
      one of the oldest languages and is often used in the study of magic. The language
      sounds harsh to most other creatures and includes numerous hard consonants and
      sibilants.
    name: Languages
    type: entries
