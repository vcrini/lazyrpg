      the {@spell lesser restoration} spell once with this trait, and you regain the
      ability to do so when you finish a long rest. Once you reach 5th level, you
      can cast the {@spell daylight} spell once with this trait, and you regain the
      ability to do so when you finish a long rest. Charisma is your spellcasting
      ability for these spells.
    name: Celestial Legacy
