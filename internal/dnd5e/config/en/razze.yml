  entries:
  - entries:
    - Although elves reach physical maturity at about the same age as humans, the
      elven understanding of adulthood goes beyond physical growth to encompass worldly
      experience. An elf typically claims adulthood and an adult name around the age
      of 100 and can live to be 750 years old.
    name: Age
    type: entries
  - entries:
    - Elves range from under 5 to over 6 feet tall and have slender builds. Your size
      is Medium.
    name: Size
    type: entries
  - entries:
    - Accustomed to twilit forests and the night sky, you have superior vision in
      dark and dim conditions. You can see in dim light within 60 feet of you as if
      it were bright light, and in darkness as if it were dim light. You can't discern
      color in darkness, only shades of gray.
    name: Darkvision
    type: entries
  - entries:
    - You have proficiency in the {@skill Perception} skill.
    name: Keen Senses
    type: entries
  - entries:
    - You have advantage on saving throws against being {@condition charmed}, and
      magic can't put you to sleep.
    name: Fey Ancestry
    type: entries
  - entries:
    - Elves don't need to sleep. Instead, they meditate deeply, remaining semiconscious,
      for 4 hours a day. (The Common word for such meditation is "trance.") While
      meditating, you can dream after a fashion; such dreams are actually mental exercises
      that have become reflexive through years of practice. After resting in this
      way, you gain the same benefit that a human does from 8 hours of sleep.
    - '{@note If you meditate during a long rest, you finish the rest after only 4
      hours. You otherwise obey all the rules for a long rest; only the duration is
      changed.}'
    name: Trance
    type: entries
  - entries:
    - You can speak, read, and write Common and Elvish. Elvish is fluid, with subtle
      intonations and intricate grammar. Elven literature is rich and varied, and
      their songs and poems are famous among other races. Many bards learn their language
      so they can add Elvish ballads to their repertoires.
    name: Languages
    type: entries
