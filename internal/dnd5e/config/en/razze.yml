      - items:
          entries:
          - You are part of a lineage that grants you supernatural abilities. The
            range of your {@sense Darkvision|XPHB} increases to 120 feet. You also
            know the {@spell Dancing Lights|XPHB} cantrip.
          - When you reach character level 3, you learn the {@spell Faerie Fire|XPHB}
            spell. When you reach character level 5, you also learn the {@spell Darkness|XPHB}
            spell. You always have these spells prepared, and you can cast each spell
            once without a spell slot. Once you cast either of these spells with this
            trait, you can't cast that spell with it again until you finish a {@variantrule
            Long Rest|XPHB}. You can also cast the spell using any spell slots you
            have of the appropriate level.
          - Intelligence, Wisdom, or Charisma is your spellcasting ability for the
