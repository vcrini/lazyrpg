  - entries:
    - Aasimar are built like well-proportioned humans. Your size is Medium.
    name: Size
    type: entries
  - entries:
    - Thanks to your celestial heritage, you have superior vision in dark and dim
      conditions. You can see in dim light within 60 feet of you as if it were bright
      light, and in darkness as if it were dim light. You can't discern color in darkness,
      only shades of grey.
