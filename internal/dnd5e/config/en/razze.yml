  - entries:
    - Your lineage stems from a dragon progenitor. Choose the kind of dragon from
      the Draconic Ancestors table. Your choice affects your Breath Weapon and {@variantrule
      Damage|XPHB} {@variantrule Resistance|XPHB} traits as well as your appearance.
