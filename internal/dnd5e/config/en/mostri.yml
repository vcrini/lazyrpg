      is also forced out if the target regains its devoured brain by means of a {@spell
      Wish|XPHB} spell. By spending 5 feet of its movement, the intellect devourer
      can voluntarily leave the body, teleporting to the nearest unoccupied space
      within 5 feet of it. The body then dies unless its brain is restored before
      the end of the intellect devourer's next turn.
