  cr: '23'
  trait:
  - name: Astral Implosion
    entries:
    - If the blob is reduced to 0 {@variantrule Hit Points|XPHB}, it implodes and
      ejects any creatures and objects engulfed by it into the Astral Sea. The blob
      itself vanishes, leaving behind a layer of slime on everything that was within
      600 feet of it. In {@dice 1d20} years, the blob reconstitutes on a random world
      in the Material Plane.
  - name: Legendary Resistance (4/Day)
    entries:
    - If the blob fails a saving throw, it can choose to succeed instead.
  - name: Magic Resistance
    entries:
    - The blob has {@variantrule Advantage|XPHB} on saving throws against spells and
      other magical effects.
  action:
  - name: Multiattack
    entries:
    - The blob makes two Pseudopod attacks and uses Engulf. It can replace one attack
      with a use of Restraining Glob.
  - name: Pseudopod
    entries:
    - '{@atkr m} {@hit 15}, reach 30 ft. {@h}24 ({@damage 3d10 + 8}) Force damage.'
  - name: Engulf
    entries:
    - The blob moves up to its {@variantrule Speed|XPHB} and can move through the
      spaces of Huge or smaller creatures and objects. {@actSave str} {@dc 23}, each
      creature or object whose space the blob enters for the first time during this
      move. {@actSaveFail} The target is engulfed. While engulfed, a target has {@variantrule
      Cover|XPHB|Total Cover} against attacks and other effects outside the blob,
      and when the blob moves, the engulfed target moves with it. A nonmagical object
      is destroyed after spending 1 minute engulfed.
    - While engulfed, a creature takes 21 ({@damage 6d6}) Force damage at the start
      of each of its turns, is suffocating, has the {@condition Restrained|XPHB} condition,
      and repeats the save at the end of each of its turns. An engulfed creature that
      is reduced to 0 {@variantrule Hit Points|XPHB} dissolves into ash, which is
      ejected into the Astral Sea. {@actSaveSuccess} The target escapes and enters
      the nearest unoccupied space.
  - name: Restraining Glob
    entries:
    - The blob lobs a slimy glob at one Large or smaller creature it can see within
      600 feet of itself. {@actSave dex} {@dc 23}, the targeted creature. {@actSaveFail}
      18 ({@damage 3d6 + 8}) Acid damage. The glob rolls the target 60 feet straight
      toward the blob, and the target has the {@condition Restrained|XPHB} condition
      until the end of its next turn, when the glob harmlessly dissolves. {@actSaveSuccess}
      Half damage only.
  legendary:
  - name: Decay
    entries:
    - The blob deals 14 ({@damage 4d6}) Necrotic damage to each creature engulfed
      by it. The blob can't take this action again until the start of its next turn.
  - name: Grasping Glob
    entries:
    - The blob uses Restraining Glob. The blob can't take this action again until
      the start of its next turn.
  - name: Lashing Goop
    entries:
    - The blob makes one Pseudopod attack.
