  trait:
  - name: Inscrutable
    entries:
    - The sphinx is immune to any effect that would sense its emotions or read its
      thoughts, as well as any divination spell that it refuses. Wisdom ({@skill Insight})
      checks made to ascertain the sphinx's intentions or sincerity have disadvantage.
  - name: Magic Weapons
    entries:
    - The sphinx's weapon attacks are magical.
  action:
