  trait:
  - name: Negative Energy Cone
    entries:
    - The death tyrant's central eye emits an {@condition invisible}, magical 150-foot
      cone of negative energy. At the start of each of its turns, the tyrant decides
      which way the cone faces and whether the cone is active.
    - Any creature in that area can't regain hit points. Any humanoid that dies there
      becomes a {@creature zombie} under the tyrant's command. The dead humanoid retains
      its place in the initiative order and animates at the start of its next turn,
      provided that its body hasn't been completely destroyed.
  action:
  - name: Bite
    entries:
    - '{@atk mw} {@hit 5} to hit, reach 5 ft., one target. {@h}14 ({@damage 4d6})
      piercing damage.'
  - name: Eye Rays
    entries:
    - 'The death tyrant shoots three of the following magical eye rays at random (reroll
      duplicates), choosing one to three targets it can see within 120 feet of it:'
    - type: list
      style: list-hang-notitle
      items:
      - type: itemSub
        name: 1. Charm Ray
        entry: The targeted creature must succeed on a {@dc 17} Wisdom saving throw
          or be {@condition charmed} by the death tyrant for 1 hour, or until the
          death tyrant harms the creature.
      - type: itemSub
        name: 2. Paralyzing Ray
        entry: The targeted creature must succeed on a {@dc 17} Constitution saving
          throw or be {@condition paralyzed} for 1 minute. The target can repeat the
          saving throw at the end of each of its turns, ending the effect on itself
          on a success.
      - type: itemSub
        name: 3. Fear Ray
        entry: The targeted creature must succeed on a {@dc 17} Wisdom saving throw
          or be {@condition frightened} for 1 minute. The target can repeat the saving
          throw at the end of each of its turns, ending the effect on itself on a
          success.
      - type: itemSub
        name: 4. Slowing Ray
        entry: The targeted creature must succeed on a {@dc 17} Dexterity saving throw.
          On a failed save, the target's speed is halved for 1 minute. In addition,
          the creature can't take reactions, and it can take either an action or a
          bonus action on its turn, not both. The creature can repeat the saving throw
          at the end of each of its turns, ending the effect on itself on a success.
      - type: itemSub
        name: 5. Enervation Ray
        entry: The targeted creature must make a {@dc 17} Constitution saving throw,
          taking 36 ({@damage 8d8}) necrotic damage on a failed save, or half as much
          damage on a successful one.
      - type: itemSub
        name: 6. Telekinetic Ray
        entries:
        - If the target is a creature, it must succeed on a {@dc 17} Strength saving
          throw or the death tyrant moves it up to 30 feet in any direction. It is
          {@condition restrained} by the ray's telekinetic grip until the start of
          the death tyrant's next turn or until the death tyrant is {@condition incapacitated}.
        - If the target is an object weighing 300 pounds or less that isn't being
          worn or carried, it is moved up to 30 feet in any direction. The death tyrant
          can also exert fine control on objects with this ray, such as manipulating
          a simple tool or opening a door or a container.
      - type: itemSub
        name: 7. Sleep Ray
        entry: The targeted creature must succeed on a {@dc 17} Wisdom saving throw
          or fall asleep and remain {@condition unconscious} for 1 minute. The target
          awakens if it takes damage or another creature takes an action to wake it.
          This ray has no effect on constructs and undead.
      - type: itemSub
        name: 8. Petrification Ray
        entry: The targeted creature must make a {@dc 17} Dexterity saving throw.
          On a failed save, the creature begins to turn to stone and is {@condition
          restrained}. It must repeat the saving throw at the end of its next turn.
          On a success, the effect ends. On a failure, the creature is {@condition
          petrified} until freed by the  {@spell greater restoration} spell or other
          magic.
      - type: itemSub
        name: 9. Disintegration Ray
        entries:
        - If the target is a creature, it must succeed on a {@dc 17} Dexterity saving
          throw or take 45 ({@damage 10d8}) force damage. If this damage reduces the
          creature to 0 hit points, its body becomes a pile of fine gray dust.
        - If the target is a Large or smaller nonmagical object or creation of magical
          force, it is disintegrated without a saving throw. If the target is a Huge
          or larger object or creation of magical force, this ray disintegrates a
          10-foot cube of it.
      - type: itemSub
        name: 10. Death Ray
        entry: The targeted creature must succeed on a {@dc 17} Dexterity saving throw
          or take 55 ({@damage 10d10}) necrotic damage. The target dies if the ray
          reduces it to 0 hit points.
  legendary:
  - name: Eye Ray
    entries:
    - The death tyrant uses one random eye ray.
