  - name: Prone Deficiency
    entries:
    - If the flumph is knocked {@condition prone}, roll a die. On an odd result, the
      flumph lands upside-down and is {@condition incapacitated}. At the end of each
      of its turns, the flumph can make a {@dc 10} Dexterity saving throw, righting
      itself and ending the {@condition incapacitated} condition if it succeeds.
