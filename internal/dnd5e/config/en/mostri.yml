      + 6}) slashing damage.'
  - name: Roar (3/Day)
    entries:
    - The sphinx emits a magical roar. Each time it roars before finishing a long
      rest, the roar is louder and the effect is different, as detailed below. Each
      creature within 500 feet of the sphinx and able to hear the roar must make a
      saving throw.
    - type: list
      style: list-hang-notitle
      items:
      - type: item
        name: First Roar
        entry: Each creature that fails a {@dc 18} Wisdom saving throw is {@condition
          frightened} for 1 minute. A {@condition frightened} creature can repeat
          the saving throw at the end of each of its turns, ending the effect on itself
          on a success.
      - type: item
        name: Second Roar
        entry: Each creature that fails a {@dc 18} Wisdom saving throw is {@condition
          deafened} and {@condition frightened} for 1 minute. A {@condition frightened}
          creature is {@condition paralyzed} and can repeat the saving throw at the
          end of each of its turns, ending the effect on itself on a success.
      - type: item
        name: Third Roar
        entry: Each creature makes a {@dc 18} Constitution saving throw. On a failed
          save, a creature takes 44 ({@damage 8d10}) thunder damage and is knocked
          {@condition prone}. On a successful save, the creature takes half as much
          damage and isn't knocked {@condition prone}.
  legendary:
  - name: Claw Attack
    entries:
    - The sphinx makes one claw attack.
  - name: Teleport (Costs 2 Actions)
    entries:
    - The sphinx magically teleports, along with any equipment it is wearing or carrying,
      up to 120 feet to an unoccupied space it can see.
  - name: Cast a Spell (Costs 3 Actions)
    entries:
    - The sphinx casts a spell from its list of prepared spells, using a spell slot
      as normal.
