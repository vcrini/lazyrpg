    entries:
    - The giant makes two morningstar attacks.
  - name: Morningstar
    entries:
    - '{@atk mw} {@hit 12} to hit, reach 10 ft., one target. {@h}21 ({@damage 3d8
      + 8}) piercing damage.'
  - name: Rock
    entries:
    - '{@atk rw} {@hit 12} to hit, range 60/240 ft., one target. {@h}30 ({@damage
      4d10 + 8}) bludgeoning damage.'
  variant:
  - type: variant
    name: New Giant Options
    entries:
    - Some adult cloud giants have the magical ability to create barriers of gale-force
      wind around themselves that can deflect incoming missiles. Others like to fling
      enemies through the air. These abilities are represented by the following action
      options.
    - name: Fling
      type: entries
      entries:
      - The giant tries to throw a Small or Medium creature within 10 feet of it.
        The target must succeed on a {@dc 20} Dexterity saving throw or be hurled
        up to 60 feet horizontally in a direction of the giant's choice and land {@condition
        prone}, taking 4 ({@damage 1d8}) bludgeoning damage for every 10 feet it was
        thrown.
    - name: Wind Aura
      type: entries
      entries:
      - A magical aura of wind surrounds the giant. The aura is a 10-foot-radius sphere
        that lasts as long as the giant maintains {@status concentration} on it (as
        if {@status concentration||concentrating} on a spell). While the aura is in
        effect, the giant gains a +2 bonus to its AC against ranged weapon attacks,
        and all open flames within the aura are extinguished unless they are magical.
