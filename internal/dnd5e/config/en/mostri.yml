  trait:
  - name: Legendary Resistance (3/Day)
    entries:
    - If the lich fails a saving throw, it can choose to succeed instead.
  - name: Rejuvenation
    entries:
    - If it has a phylactery, a destroyed lich gains a new body in {@dice 1d10} days,
      regaining all its hit points and becoming active again. The new body appears
      within 5 feet of the phylactery.
  - name: Turn Resistance
    entries:
    - The lich has advantage on saving throws against any effect that turns undead.
  action:
  - name: Paralyzing Touch
    entries:
    - '{@atk ms} {@hit 12} to hit, reach 5 ft., one creature. {@h}10 ({@damage 3d6})
      cold damage. The target must succeed on a {@dc 18} Constitution saving throw
      or be {@condition paralyzed} for 1 minute. The target can repeat the saving
      throw at the end of each of its turns, ending the effect on itself on a success.'
  legendary:
  - name: Cantrip
    entries:
    - The lich casts a cantrip.
  - name: Paralyzing Touch (Costs 2 Actions)
    entries:
    - The lich uses its Paralyzing Touch.
  - name: Frightening Gaze (Costs 2 Actions)
    entries:
    - The lich fixes its gaze on one creature it can see within 10 feet of it. The
      target must succeed on a {@dc 18} Wisdom saving throw against this magic or
      become {@condition frightened} for 1 minute. The {@condition frightened} target
      can repeat the saving throw at the end of each of its turns, ending the effect
      on itself on a success. If a target's saving throw is successful or the effect
      ends for it, the target is immune to the lich's gaze for the next 24 hours.
  - name: Disrupt Life (Costs 3 Actions)
    entries:
    - Each non-undead creature within 20 feet of the lich must make a {@dc 18} Constitution
      saving throw against this magic, taking 21 ({@damage 6d6}) necrotic damage on
      a failed save, or half as much damage on a successful one.
