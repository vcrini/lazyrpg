  spellcasting:
  - name: Innate Spellcasting
    type: spellcasting
    headerEntries:
    - 'The dao''s innate spellcasting ability is Charisma (spell save {@dc 14}, {@hit
      6} to hit with spell attacks). It can innately cast the following spells, requiring
      no material components:'
    will:
    - '{@spell detect evil and good}'
    - '{@spell detect magic}'
    - '{@spell stone shape}'
    daily:
      3e:
      - '{@spell passwall}'
      - '{@spell move earth}'
      - '{@spell tongues}'
      1e:
      - '{@spell conjure elemental} ({@creature earth elemental} only)'
      - '{@spell gaseous form}'
      - '{@spell invisibility}'
      - '{@spell phantasmal killer}'
      - '{@spell plane shift}'
      - '{@spell wall of stone}'
    ability: cha
  trait:
  - name: Earth Glide
    entries:
    - The dao can burrow through nonmagical, unworked earth and stone. While doing
      so, the dao doesn't disturb the material it moves through.
  - name: Elemental Demise
    entries:
    - If the dao dies, its body disintegrates into crystalline powder, leaving behind
      only equipment the dao was wearing or carrying.
  - name: Sure-Footed
    entries:
    - The dao has advantage on Strength and Dexterity saving throws made against effects
      that would knock it {@condition prone}.
  action:
  - name: Multiattack
    entries:
    - The Dao makes two fist attacks or two maul attacks.
  - name: Fist
    entries:
    - '{@atk mw} {@hit 10} to hit, reach 5 ft., one target. {@h}15 ({@damage 2d8 +
      6}) bludgeoning damage.'
  - name: Maul
    entries:
    - '{@atk mw} {@hit 10} to hit, reach 5 ft., one target. {@h}20 ({@damage 4d6 +
      6}) bludgeoning damage. If the target is a Huge or smaller creature, it must
      succeed on a {@dc 18} Strength check or be knocked {@condition prone}.'
  variant:
  - type: variant
    name: Genie Powers
    entries:
    - Genies have a variety of magical capabilities, including spells. A few have
      even greater powers that allow them to alter their appearance or the nature
      of reality.
    - type: entries
      name: Disguises
      entries:
      - Some genies can veil themselves in illusion to pass as other similarly shaped
        creatures. Such genies can innately cast the {@spell disguise self} spell
        at will, often with a longer duration than is normal for that spell. Mightier
        genies can cast the {@spell true polymorph} spell one to three times per day,
        possibly with a longer duration than normal. Such genies can change only their
        own shape, but a rare few can use the spell on other creatures and objects
        as well.
    - type: entries
      name: Wishes
      entries:
      - The genie power to grant wishes is legendary among mortals. Only the most
        potent genies, such as those among the nobility, can do so. A particular genie
        that has this power can grant one to three wishes to a creature that isn't
        a genie. Once a genie has granted its limit of wishes, it can't grant wishes
        again for some amount of time (usually 1 year), and cosmic law dictates that
        the same genie can expend its limit of wishes on a specific creature only
        once in that creature's existence.
      - To be granted a wish, a creature within 60 feet of the genie states a desired
        effect to it. The genie can then cast the {@spell wish} spell on the creature's
        behalf to bring about the effect. Depending on the genie's nature, the genie
        might try to pervert the intent of the wish by exploiting the wish's poor
        wording. The perversion of the wording is usually crafted to be to the genie's
        benefit.
  environment:
  - underdark
