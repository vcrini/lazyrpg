  - Draconic
  cr: '14'
  trait:
  - name: Legendary Resistance (3/Day)
    entries:
    - If the dragon fails a saving throw, it can choose to succeed instead.
  action:
  - name: Multiattack
    entries:
    - 'The dragon can use its Frightful Presence. It then makes three attacks: one
      with its bite and two with its claws.'
  - name: Bite
    entries:
    - '{@atk mw} {@hit 11} to hit, reach 10 ft., one target. {@h}17 ({@damage 2d10
      + 6}) piercing damage.'
  - name: Claw
    entries:
    - '{@atk mw} {@hit 11} to hit, reach 5 ft., one target. {@h}13 ({@damage 2d6 +
      6}) slashing damage.'
  - name: Tail
    entries:
    - '{@atk mw} {@hit 11} to hit, reach 15 ft., one target. {@h}15 ({@damage 2d8
      + 6}) bludgeoning damage.'
  - name: Frightful Presence
    entries:
    - Each creature of the dragon's choice that is within 120 feet of the dragon and
      aware of it must succeed on a {@dc 16} Wisdom saving throw or become {@condition
      frightened} for 1 minute. A creature can repeat the saving throw at the end
      of each of its turns, ending the effect on itself on a success. If a creature's
      saving throw is successful or the effect ends for it, the creature is immune
      to the dragon's Frightful Presence for the next 24 hours.
  - name: Breath Weapons {@recharge 5}
    entries:
    - The dragon uses one of the following breath weapons.
    - type: list
      style: list-hang-notitle
      items:
      - type: item
        name: Acid Breath
        entry: The dragon exhales acid in a 60-foot line that is 5 feet wide. Each
          creature in that line must make a {@dc 18} Dexterity saving throw, taking
          54 ({@damage 12d8}) acid damage on a failed save, or half as much damage
          on a successful one.
      - type: item
        name: Slowing Breath
        entry: The dragon exhales gas in a 60-foot cone. Each creature in that area
          must succeed on a {@dc 18} Constitution saving throw. On a failed save,
          the creature can't use reactions, its speed is halved, and it can't make
          more than one attack on its turn. In addition, the creature can use either
          an action or a bonus action on its turn, but not both. These effects last
          for 1 minute. The creature can repeat the saving throw at the end of each
          of its turns, ending the effect on itself with a successful save.
  legendary:
  - name: Detect
    entries:
    - The dragon makes a Wisdom ({@skill Perception}) check.
  - name: Tail Attack
    entries:
    - The dragon makes a tail attack.
  - name: Wing Attack (Costs 2 Actions)
    entries:
    - The dragon beats its wings. Each creature within 10 feet of the dragon must
      succeed on a {@dc 19} Dexterity saving throw or take 13 ({@damage 2d6 + 6})
      bludgeoning damage and be knocked {@condition prone}. The dragon can then fly
      up to half its flying speed.
  legendaryGroup:
    name: Copper Dragon
    source: MM
  variant:
  - type: inset
    name: Customizing Dragons
    source: FTD
    page: 33
    entries:
    - You can customize any dragon's stat block to reflect the dragon's unique character.
      Minor changes such as those below are easy to make and have no impact on a dragon's
      challenge rating.
    - type: entries
      name: Languages
      entries:
      - Most dragons prefer to speak Draconic but learn Common for dealing with allies
        and minions. But given their high Intelligence and long life span, dragons
        can easily learn additional languages. You can add languages to a dragon's
        stat block.
    - type: entries
      name: Skills
      entries:
      - Most dragons are proficient in the {@skill Perception} and {@skill Stealth}
        skills, and many dragons have additional skill proficiencies. As with languages,
        you can customize a dragon's skill list (even doubling their proficiency bonus
        with certain skills) to reflect particular interests and activities. You can
        also give a dragon tool proficiencies, particularly if the dragon spends time
        in Humanoid form.
    - type: entries
      name: Spells
      entries:
      - '{@note See the "Variant: Dragons as Innate Spellcasters" inset(s), below.}'
    - type: entries
      name: Other Traits and Actions
      entries:
      - 'You can borrow traits and actions from other monsters to add unique flavor
        to a dragon. Consider these examples:'
      - type: list
        style: list-hang-notitle
        items:
        - type: item
          name: Change Shape
          entries:
          - 'You can decide that a dragon acquires this action at a younger age than
            usual, particularly if you want to feature a dragon in Humanoid form in
            your campaign:'
          - The dragon magically polymorphs into a humanoid or beast that has a challenge
            rating no higher than its own, or back into its true form. It reverts
            to its true form if it dies. Any equipment it is wearing or carrying is
            absorbed or borne by the new form (the dragon's choice).
          - In a new form, the dragon retains its alignment, hit points, Hit Dice,
            ability to speak, proficiencies, Legendary Resistance, lair actions, and
            Intelligence, Wisdom, and Charisma scores, as well as this action. Its
            statistics and capabilities are otherwise replaced by those of the new
            form, except any class features or legendary actions of that form.
        - type: item
          name: Flyby
          entries:
          - The dragon is an agile flier, quick to fly out of enemies' reach.
          - The dragon doesn't provoke an opportunity attack when it flies out of
            an enemy's reach.
        - type: item
          name: Mimicry
          entries:
          - Impersonating characters or their allies could be a fun trick for a crafty
            dragon.
          - The dragon can mimic any sounds it has heard, including voices. A creature
            that hears the sounds can tell they are imitations with a successful {@dc
            16} Wisdom ({@skill Insight}) check.
        - type: item
          name: Rejuvenation
          entries:
          - You might decide that dragons in your campaign, being an essential part
            of the Material Plane, are nearly impossible to destroy. A dragon's life
            essence might be preserved in the egg from which it first emerged, in
            its hoard, or in a cavernous hall at the center of the world, just as
            a lich's essence is hidden in a phylactery.
          - If it has an essence-preserving object, a destroyed dragon gains a new
            body in {@dice 1d10} days, regaining all its hit points and becoming active
            again. The new body appears within 5 feet of the object.
        - type: item
          name: Special Senses
          entries:
          - Most dragons have {@sense blindsight} and {@sense darkvision}. You might
            upgrade {@sense blindsight} to {@sense truesight}, or you could give a
            dragon with a burrowing speed {@sense tremorsense|MM}.
