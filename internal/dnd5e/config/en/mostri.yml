      piercing damage, and the target must succeed on a {@dc 10} Constitution saving
      throw or take 5 ({@damage 2d4}) poison damage and become {@condition poisoned}
      for 1 minute. The target can repeat the saving throw at the end of each of its
      turns, ending the effect on itself on a success.'
  - name: Scare (1/Day)
    entries:
    - One creature of the quasit's choice within 20 feet of it must succeed on a {@dc
      10} Wisdom saving throw or be {@condition frightened} for 1 minute. The target
      can repeat the saving throw at the end of each of its turns, with disadvantage
      if the quasit is within line of sight, ending the effect on itself on a success.
  - name: Invisibility
    entries:
    - The quasit magically turns {@condition invisible} until it attacks or uses Scare,
      or until its {@status concentration} ends (as if {@status concentration||concentrating}
      on a spell). Any equipment the quasit wears or carries is {@condition invisible}
      with it.
  variant:
  - type: variant
    name: Quasit Familiar
    entries:
    - Mortal spellcasters interested in extraplanar familiars find quasits easy to
      summon and eager to serve. The quasit plays the part of the obsequious servant.
      It serves its master well, but it goads the mortal to greater and greater acts
      of chaos and evil. Such quasits have the following trait.
    - name: Familiar
      type: entries
      entries:
      - The quasit can serve another creature as a familiar, forming a telepathic
        bond with its willing master. While the two are bonded, the master can sense
        what the quasit senses as long as they are within 1 mile of each other. While
        the quasit is within 10 feet of its master, the master shares the quasit's
        Magic Resistance trait. At any time and for any reason, the quasit can end
        its service as a familiar, ending the telepathic bond.
