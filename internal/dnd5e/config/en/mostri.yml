  - name: Magic Resistance
    entries:
    - The mummy has {@variantrule Advantage|XPHB} on saving throws against spells
      and other magical effects.
  - name: Undead Restoration
    entries:
    - If destroyed, the mummy gains a new body in 24 hours if its heart is intact,
      reviving with all its {@variantrule Hit Points|XPHB}. The new body appears in
