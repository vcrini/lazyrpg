  trait:
  - name: Amphibious
    entries:
    - The hag can breathe air and water.
  - name: Horrific Appearance
    entries:
    - Any humanoid that starts its turn within 30 feet of the hag and can see the
      hag's true form must make a {@dc 11} Wisdom saving throw. On a failed save,
      the creature is {@condition frightened} for 1 minute. A creature can repeat
      the saving throw at the end of each of its turns, with disadvantage if the hag
      is within line of sight, ending the effect on itself on a success. If a creature's
      saving throw is successful or the effect ends for it, the creature is immune
      to the hag's Horrific Appearance for the next 24 hours.
    - Unless the target is {@status surprised} or the revelation of the hag's true
      form is sudden, the target can avert its eyes and avoid making the initial saving
      throw. Until the start of its next turn, a creature that averts its eyes has
      disadvantage on attack rolls against the hag.
  action:
  - name: Claws
    entries:
    - '{@atk mw} {@hit 5} to hit, reach 5 ft., one target. {@h}10 ({@damage 2d6 +
      3}) slashing damage.'
  - name: Death Glare
    entries:
    - The hag targets one {@condition frightened} creature she can see within 30 feet
      of her. If the target can see the hag, it must succeed on a {@dc 11} Wisdom
      saving throw against this magic or drop to 0 hit points.
  - name: Illusory Appearance
    entries:
    - The hag covers herself and anything she is wearing or carrying with a magical
      illusion that makes her look like an ugly creature of her general size and humanoid
      shape. The effect ends if the hag takes a bonus action to end it or if she dies.
    - The changes wrought by this effect fail to hold up to physical inspection. For
      example, the hag could appear to have no claws, but someone touching her hand
      might feel the claws. Otherwise, a creature must take an action to visually
      inspect the illusion and succeed on a {@dc 16} Intelligence ({@skill Investigation})
      check to discern that the hag is disguised.
  legendaryGroup:
    name: Sea Hag
    source: MM
  variant:
  - type: inset
    name: Hag Covens
    entries:
    - When hags must work together, they form covens, in spite of their selfish natures.
      A coven is made up of hags of any type, all of whom are equals within the group.
      However, each of the hags continues to desire more personal power.
    - A coven consists of three hags so that any arguments between two hags can be
      settled by the third. If more than three hags ever come together, as might happen
      if two covens come into conflict, the result is usually chaos.
    - type: spellcasting
      name: Shared Spellcasting (Coven Only)
      headerEntries:
      - 'While all three members of a hag coven are within 30 feet of one another,
        they can each cast the following spells from the wizard''s spell list but
        must share the spell slots among themselves:'
      spells:
        '1':
          slots: 4
          spells:
          - '{@spell identify}'
          - '{@spell ray of sickness}'
        '2':
          slots: 3
          spells:
          - '{@spell hold person}'
          - '{@spell locate object}'
        '3':
          slots: 3
          spells:
          - '{@spell bestow curse}'
          - '{@spell counterspell}'
          - '{@spell lightning bolt}'
        '4':
          slots: 3
          spells:
          - '{@spell phantasmal killer}'
          - '{@spell polymorph}'
        '5':
          slots: 2
          spells:
          - '{@spell contact other plane}'
          - '{@spell scrying}'
        '6':
          slots: 1
          spells:
          - '{@spell eyebite}'
      footerEntries:
      - For casting these spells, each hag is a 12th-level spellcaster that uses Intelligence
        as her spellcasting ability. The spell save DC is 12 + the hag's Intelligence
        modifier, and the spell attack bonus is 4 + the hag's Intelligence modifier.
    - type: entries
      name: Hag Eye
      entries:
      - A hag coven can craft a magic item called a hag eye, which is made from a
        real eye coated in varnish and often fitted to a pendant or other wearable
        item. The hag eye is usually entrusted to a minion for safekeeping and transport.
        A hag in the coven can take an action to see what the hag eye sees if the
        hag eye is on the same plane of existence. A hag eye has AC 10, 1 hit point,
        and darkvision with a radius of 60 feet. If it is destroyed, each coven member
        takes {@damage 3d10} psychic damage and is {@condition blinded} for 24 hours.
      - A hag coven can have only one hag eye at a time, and creating a new one requires
        all three members of the coven to perform a ritual. The ritual takes 1 hour,
        and the hags can't perform it while {@condition blinded}. During the ritual,
        if the hags take any action other than performing the ritual, they must start
        over.
