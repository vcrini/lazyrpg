      the behir must succeed on a {@dc 14} Constitution saving throw at the end of
      that turn or regurgitate the creature, which falls {@condition prone} in a space
      within 10 feet of the behir. If the behir dies, a swallowed creature is no longer
      {@condition restrained} by it and can escape from the corpse by using 15 feet
