        entry: The targeted creature must succeed on a {@dc 16} Constitution saving
          throw or be {@condition paralyzed} for 1 minute. The target can repeat the
          saving throw at the end of each of its turns, ending the effect on itself
          on a success.
      - type: itemSub
        name: 3. Fear Ray
        entry: The targeted creature must succeed on a {@dc 16} Wisdom saving throw
          or be {@condition frightened} for 1 minute. The target can repeat the saving
          throw at the end of each of its turns, ending the effect on itself on a
          success.
      - type: itemSub
        name: 4. Slowing Ray
        entry: The targeted creature must succeed on a {@dc 16} Dexterity saving throw.
          On a failed save, the target's speed is halved for 1 minute. In addition,
          the creature can't take reactions, and it can take either an action or a
          bonus action on its turn, not both. The creature can repeat the saving throw
          at the end of each of its turns, ending the effect on itself on a success.
      - type: itemSub
        name: 5. Enervation Ray
        entry: The targeted creature must make a {@dc 16} Constitution saving throw,
          taking 36 ({@damage 8d8}) necrotic damage on a failed save, or half as much
          damage on a successful one.
      - type: itemSub
        name: 6. Telekinetic Ray
        entries:
        - If the target is a creature, it must succeed on a {@dc 16} Strength saving
          throw or the beholder moves it up to 30 feet in any direction. It is {@condition
          restrained} by the ray's telekinetic grip until the start of the beholder's
          next turn or until the beholder is {@condition incapacitated}.
        - If the target is an object weighing 300 pounds or less that isn't being
          worn or carried, it is moved up to 30 feet in any direction. The beholder
          can also exert fine control on objects with this ray, such as manipulating
          a simple tool or opening a door or a container.
      - type: itemSub
        name: 7. Sleep Ray
        entry: The targeted creature must succeed on a {@dc 16} Wisdom saving throw
          or fall asleep and remain {@condition unconscious} for 1 minute. The target
          awakens if it takes damage or another creature takes an action to wake it.
          This ray has no effect on constructs and undead.
      - type: itemSub
        name: 8. Petrification Ray
        entry: The targeted creature must make a {@dc 16} Dexterity saving throw.
          On a failed save, the creature begins to turn to stone and is {@condition
          restrained}. It must repeat the saving throw at the end of its next turn.
          On a success, the effect ends. On a failure, the creature is {@condition
          petrified} until freed by the  {@spell greater restoration} spell or other
          magic.
      - type: itemSub
        name: 9. Disintegration Ray
        entries:
        - If the target is a creature, it must succeed on a {@dc 16} Dexterity saving
          throw or take 45 ({@damage 10d8}) force damage. If this damage reduces the
          creature to 0 hit points, its body becomes a pile of fine gray dust.
        - If the target is a Large or smaller nonmagical object or creation of magical
          force, it is disintegrated without a saving throw. If the target is a Huge
          or larger object or creation of magical force, this ray disintegrates a
          10-foot cube of it.
      - type: itemSub
        name: 10. Death Ray
        entry: The targeted creature must succeed on a {@dc 16} Dexterity saving throw
          or take 55 ({@damage 10d10}) necrotic damage. The target dies if the ray
          reduces it to 0 hit points.
  legendaryHeader:
  - The beholder can take 3 legendary actions, using the Eye Ray option below. It
    can take only one legendary action at a time and only at the end of another creature's
    turn. The beholder regains spent legendary actions at the start of its turn.
  legendary:
  - name: Eye Ray
    entries:
    - The beholder uses one random eye ray.
  legendaryGroup:
    name: Beholder
    source: MM
  variant:
  - type: inset
    name: Variant Abilities
    entries:
    - When a beholder's dream-imagination runs wild, the result can be an offspring
      that has an unusual or unique set of abilities. Rather than the standard powers
      of a beholder's central eye and eyestalks, the creature has one or more variant
      abilities—guaranteed to surprise any enemies who thought they knew what they
      were getting themselves into.
    - This section provides several alternative spell effects for a beholder's eye.
      Each of these effects is designed to be of the same power level as the one it
      replaces, enabling you to create a custom beholder without altering the monster's
      challenge rating. As another option, you can switch any of the damaging eye
      rays in the {@book Monster Manual|MM} to an effect with a different damage type,
      such as replacing the enervation ray with a combustion ray that deals fire damage
      instead of necrotic damage.
    - Unless otherwise indicated, an alternative ability has the same range as the
      eye ray it is replacing, and it affects only one creature per use (even if the
      ability is based on a spell that normally affects an area or multiple targets).
      The saving throw for an alternative ability uses the same DC and the same ability
      score as the spell the eye ray is based on.
    - type: list
      style: list-hang-notitle
      items:
      - type: item
        name: 'Antimagic Cone:'
        entry: '{@spell mirage arcane}, {@spell power word stun} (affecting the weakest
          non-{@condition stunned} target in the cone each round)'
      - type: item
        name: 'Charm Ray:'
        entry: '{@spell banishment} (1 minute), {@spell confusion} (1 minute)'
      - type: item
        name: 'Death Ray:'
        entry: '{@spell circle of death} (10-foot-radius sphere; 4d6 necrotic damage
          to all creatures in the area), {@spell feeblemind}'
      - type: item
        name: 'Disintegration Ray:'
        entry: '{@spell chain lightning} (primary target takes 6d8 lightning damage;
          two secondary targets within 30 feet of the primary target take 3d8 lightning
          damage each), {@spell eyebite} (sickened effect; 1 minute)'
      - type: item
        name: 'Enervation Ray:'
        entry: '{@spell create undead} (usable regardless of the time of day), {@spell
          polymorph} (1 minute)'
      - type: item
        name: 'Fear Ray:'
        entry: '{@spell gaseous form} (self or willing creature only), {@spell moonbeam}'
      - type: item
        name: 'Paralyzing Ray:'
        entry: '{@spell modify memory}, {@spell silence} (1 minute)'
      - type: item
        name: 'Petrification Ray:'
        entry: '{@spell Otto''s irresistible dance} (1 minute), {@spell wall of ice}
          (1 minute; one 10-foot-square panel)'
      - type: item
        name: 'Sleep Ray:'
        entry: '{@spell blindness/deafness}, {@spell misty step} (self or willing
          creature only)'
      - type: item
        name: 'Slowing Ray:'
        entry: '{@spell bestow curse} (1 minute), {@spell sleet storm} (one 10-foot-cube)'
      - type: item
        name: 'Telekinesis Ray:'
        entry: '{@spell geas} (1 hour), {@spell wall of force} (1 minute; one 10-foot-square
          panel)'
    source: VGM
    page: 12
