    - A faerie dragon's scales change hue as it ages, moving through all the colors
      of the rainbow. All faerie dragons have innate spellcasting ability, gaining
      new spells as they mature.
    - Red—5 years or less
    - Orange—6–10 years
    - Yellow—11–20 years
    - Green—21–30 years
    - Blue—31–40 years
    - Indigo—41–50 years
    - Violet—51 years or more
    - A green or older faerie dragon's CR increases to 2.
  - name: Superior Invisibility
    entries:
    - As a bonus action, the dragon can magically turn {@condition invisible} until
      its {@status concentration} ends (as if {@status concentration||concentrating}
      on a spell). Any equipment the dragon wears or carries is {@condition invisible}
      with it.
  - name: Limited Telepathy
    entries:
    - Using telepathy, the dragon can magically communicate with any other faerie
      dragon within 60 feet of it.
  - name: Magic Resistance
    entries:
    - The faerie dragon has advantage on saving throws against spells and other magical
      effects.
  action:
  - name: Bite
    entries:
    - '{@atk mw} {@hit 7} to hit, reach 5 ft., one creature. {@h}1 piercing damage.'
  - name: Euphoria Breath {@recharge 5}
    entries:
    - 'The dragon exhales a puff of euphoria gas at one creature within 5 feet of
      it. The target must succeed on a {@dc 11} Wisdom saving throw, or for 1 minute,
      the target can''t take reactions and must roll a {@dice d6} at the start of
      each of its turns to determine its behavior during the turn:'
    - 1–4. The target takes no action or bonus action and uses all of its movement
      to move in a random direction.
    - 5–6. The target doesn't move, and the only thing it can do on its turn is make
      a {@dc 11} Wisdom saving throw, ending the effect on itself on a success.
