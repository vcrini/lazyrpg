      25 ({@damage 6d6 + 4}) Psychic damage, and the target has the {@condition Paralyzed|XPHB}
      condition until the end of the mummy''s next turn.'
  reaction:
  - name: Whirlwind of Sand
    entries:
    - '{@actTrigger} The mummy is hit by an attack roll. {@actResponse} The mummy
      adds 2 to its AC against the attack, possibly causing the attack to miss, and
