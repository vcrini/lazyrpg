  - name: Ooze Cube
    entries:
    - The cube fills its entire space and is transparent. Other creatures can enter
      that space, but a creature that does so is subjected to the cube's Engulf and
      has {@variantrule Disadvantage|XPHB} on the saving throw.
    - Creatures inside the cube have {@variantrule Cover|XPHB|Total Cover}, and the
      cube can hold one Large creature or up to four Medium or Small creatures inside
      itself at a time.
    - As an action, a creature within 5 feet of the cube can pull a creature or an
      object out of the cube by succeeding on a {@dc 12} Strength ({@skill Athletics|XPHB})
      check, and the puller takes 10 ({@damage 3d6}) Acid damage.
  - name: Transparent
    entries:
    - Even when the cube is in plain sight, a creature must succeed on a {@dc 15}
      Wisdom ({@skill Perception|XPHB}) check to notice the cube if the creature hasn't
      witnessed the cube move or otherwise act.
  action:
  - name: Pseudopod
    entries:
    - '{@atkr m} {@hit 4}, reach 5 ft. {@h}12 ({@damage 3d6 + 2}) Acid damage.'
  - name: Engulf
    entries:
    - The cube moves up to its {@variantrule Speed|XPHB} without provoking {@action
      Opportunity Attack|XPHB|Opportunity Attacks}. The cube can move through the
      spaces of Large or smaller creatures if it has room inside itself to contain
      them (see the Ooze {@variantrule Cube [Area of Effect]|XPHB|Cube} trait). {@actSave
      dex} {@dc 12}, each creature whose space the cube enters for the first time
      during this move. {@actSaveFail} 10 ({@damage 3d6}) Acid damage, and the target
      is engulfed. An engulfed target is suffocating, can't cast spells with a Verbal
      component, has the {@condition Restrained|XPHB} condition, and takes 10 ({@damage
      3d6}) Acid damage at the start of each of the cube's turns. When the cube moves,
      the engulfed target moves with it. An engulfed target can try to escape by taking
      an action to make a {@dc 12} Strength ({@skill Athletics|XPHB}) check. On a
      successful check, the target escapes and enters the nearest unoccupied space.
      {@actSaveSuccess} Half damage, and the target moves to an unoccupied space within
      5 feet of the cube. If there is no unoccupied space, the target fails the save
      instead.
