  trait:
  - name: Amphibious
    entries:
    - The aboleth can breathe air and water.
  - name: Eldritch Restoration
    entries:
    - If destroyed, the aboleth gains a new body in {@dice 5d10} days, reviving with
      all its {@variantrule Hit Points|XPHB} in the Far Realm or another location
      chosen by the DM.
  - name: Legendary Resistance (3/Day, or 4/Day in Lair)
    entries:
    - If the aboleth fails a saving throw, it can choose to succeed instead.
  - name: Mucus Cloud
    entries:
    - While underwater, the aboleth is surrounded by mucus. {@actSave con} {@dc 14},
      each creature in a 5-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation}
      originating from the aboleth at the end of the aboleth's turn. {@actSaveFail}
      The target is cursed. Until the curse ends, the target's skin becomes slimy,
      the target can breathe air and water, and it can't regain {@variantrule Hit
      Points|XPHB} unless it is underwater.
    - While the cursed creature is outside a body of water, the creature takes 6 ({@damage
      1d12}) Acid damage at the end of every 10 minutes unless moisture is applied
      to its skin before those minutes have passed.
  - name: Probing Telepathy
    entries:
    - If a creature the aboleth can see communicates telepathically with the aboleth,
      the aboleth learns the creature's greatest desires.
  action:
  - name: Multiattack
    entries:
    - The aboleth makes two Tentacle attacks and uses either Consume Memories or Dominate
      Mind if available.
  - name: Tentacle
    entries:
    - '{@atkr m} {@hit 9}, reach 15 ft. {@h}12 ({@damage 2d6 + 5}) Bludgeoning damage.
      If the target is a Large or smaller creature, it has the {@condition Grappled|XPHB}
      condition (escape {@dc 14}) from one of four tentacles.'
  - name: Consume Memories
    entries:
    - '{@actSave int} {@dc 16}, one creature within 30 feet that is {@condition Charmed|XPHB}
      or {@condition Grappled|XPHB} by the aboleth. {@actSaveFail} 10 ({@damage 3d6})
      Psychic damage. {@actSaveSuccess} Half damage. {@actSaveSuccessOrFail} The aboleth
      gains the target''s memories if the target is a Humanoid and is reduced to 0
      {@variantrule Hit Points|XPHB} by this action.'
  - name: Dominate Mind (2/Day)
    entries:
    - '{@actSave wis} {@dc 16}, one creature the aboleth can see within 30 feet. {@actSaveFail}
      The target has the {@condition Charmed|XPHB} condition until the aboleth dies
      or is on a different plane of existence from the target. While {@condition Charmed|XPHB},
      the target acts as an ally to the aboleth and is under its control while within
      60 feet of it. In addition, the aboleth and the target can communicate telepathically
      with each other over any distance.'
    - The target repeats the save whenever it takes damage as well as after every
      24 hours it spends at least 1 mile away from the aboleth, ending the effect
      on itself on a success.
