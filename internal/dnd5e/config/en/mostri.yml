      the creature is freed by the  {@spell greater restoration} spell or other magic.
    - Unless {@status surprised}, a creature can avert its eyes to avoid the saving
      throw at the start of its turn. If the creature does so, it can't see the medusa
      until the start of its next turn, when it can avert its eyes again. If the creature
      looks at the medusa in the meantime, it must immediately make the save.
    - If the medusa sees itself reflected on a polished surface within 30 feet of
      it and in an area of bright light, the medusa is, due to its curse, affected
      by its own gaze.
