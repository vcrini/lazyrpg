  spellcasting:
  - name: Charm {@recharge 5}
    type: spellcasting
    headerEntries:
    - The vampire casts {@spell Charm Person|XPHB}, requiring no spell components
      and using Charisma as the spellcasting ability (spell save {@dc 17}), and the
      duration is 24 hours. The Charmed target is a willing recipient of the vampire's
      Bite, the damage of which doesn't end the spell. When the spell ends, the target
      is unaware it was Charmed by the vampire.
    recharge:
      '5':
      - '{@spell Charm Person|XPHB}'
    ability: cha
    displayAs: bonus
    hidden:
    - recharge
  - name: Beguile
    type: spellcasting
    headerEntries:
    - The vampire casts {@spell Command|XPHB}, requiring no spell components and using
      Charisma as the spellcasting ability (spell save {@dc 17}). The vampire can't
      take this action again until the start of its next turn.
    legendary:
      '1':
      - '{@spell Command|XPHB}'
    ability: cha
    displayAs: legendary
    hidden:
    - legendary
  trait:
  - name: Legendary Resistance (3/Day, or 4/Day in Lair)
    entries:
    - If the vampire fails a saving throw, it can choose to succeed instead.
  - name: Misty Escape
    entries:
    - If the vampire drops to 0 {@variantrule Hit Points|XPHB} outside its resting
      place, the vampire uses Shape-Shift to become mist (no action required). If
      it can't use Shape-Shift, it is destroyed.
    - While it has 0 {@variantrule Hit Points|XPHB} in mist form, it can't return
      to its vampire form, and it must reach its resting place within 2 hours or be
      destroyed. Once in its resting place, it returns to its vampire form and has
      the {@condition Paralyzed|XPHB} condition until it regains any {@variantrule
      Hit Points|XPHB}, and it regains 1 {@variantrule Hit Points|XPHB|Hit Point}
      after spending 1 hour there.
  - name: Spider Climb
    entries:
    - The vampire can climb difficult surfaces, including along ceilings, without
      needing to make an ability check.
  - name: Vampire Weakness
    entries:
    - 'The vampire has these weaknesses:'
    - type: list
      style: list-hang-notitle
      items:
      - type: item
        name: Forbiddance
        entries:
        - The vampire can't enter a residence without an invitation from an occupant.
      - type: item
        name: Running Water
        entries:
        - The vampire takes 20 Acid damage if it ends its turn in running water.
      - type: item
        name: Stake to the Heart
        entries:
        - If a weapon that deals Piercing damage is driven into the vampire's heart
          while the vampire has the {@condition Incapacitated|XPHB} condition in its
          resting place, the vampire has the {@condition Paralyzed|XPHB} condition
          until the weapon is removed.
      - type: item
        name: Sunlight
        entries:
        - The vampire takes 20 Radiant damage if it starts its turn in sunlight. While
          in sunlight, it has {@variantrule Disadvantage|XPHB} on attack rolls and
          ability checks.
  action:
  - name: Multiattack (Vampire Form Only)
    entries:
    - The vampire makes two Grave Strike attacks and uses Bite.
  - name: Grave Strike (Vampire Form Only)
    entries:
    - '{@atkr m} {@hit 9}, reach 5 ft. {@h}8 ({@damage 1d8 + 4}) Bludgeoning damage
      plus 7 ({@damage 2d6}) Necrotic damage. If the target is a Large or smaller
      creature, it has the {@condition Grappled|XPHB} condition (escape {@dc 14})
      from one of two hands.'
  - name: Bite (Bat or Vampire Form Only)
    entries:
    - '{@actSave con} {@dc 17}, one creature within 5 feet that is willing or that
      has the {@condition Grappled|XPHB}, {@condition Incapacitated|XPHB}, or {@condition
      Restrained|XPHB} condition. {@actSaveFail} 6 ({@damage 1d4 + 4}) Piercing damage
      plus 13 ({@damage 3d8}) Necrotic damage. The target''s {@variantrule Hit Points|XPHB|Hit
      Point} maximum decreases by an amount equal to the Necrotic damage taken, and
      the vampire regains {@variantrule Hit Points|XPHB} equal to that amount. A Humanoid
      reduced to 0 {@variantrule Hit Points|XPHB} by this damage and then buried rises
      the following sunset as a {@creature Vampire Spawn|XMM} under the vampire''s
      control.'
  bonus:
  - name: Shape-Shift
    entries:
    - If the vampire isn't in sunlight or running water, it shape-shifts into a Tiny
      bat ({@variantrule Speed|XPHB} 5 ft., {@variantrule Fly Speed|XPHB} 30 ft.)
      or a Medium cloud of mist ({@variantrule Speed|XPHB} 5 ft., {@variantrule Fly
      Speed|XPHB} 20 ft. [hover]), or it returns to its vampire form. Anything it
      is wearing transforms with it.
    - While in bat form, the vampire can't speak. Its game statistics, other than
      its size and {@variantrule Speed|XPHB}, are unchanged.
    - While in mist form, the vampire can't take any actions, speak, or manipulate
      objects. It is weightless and can enter an enemy's space and stop there. If
      air can pass through a space, the mist can do so, but it can't pass through
      liquid. It has {@variantrule Resistance|XPHB} to all damage, except the damage
      it takes from sunlight.
  legendaryActionsLair: 4
  legendary:
  - name: Deathless Strike
    entries:
    - The vampire moves up to half its {@variantrule Speed|XPHB}, and it makes one
      Grave Strike attack.
  legendaryGroup:
    name: Vampire
    source: XMM
  environment:
  - underdark
