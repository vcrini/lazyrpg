      it by taking an action to make a {@dc 15} Charisma ({@skill Persuasion|XPHB})
      check; the golem must be able to hear its creator. If this check succeeds, the
      golem ceases being berserk until the start of its next turn, at which point
      it resumes rolling for the Berserk trait again if it is still {@status Bloodied|XPHB}.
