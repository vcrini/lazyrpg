  - name: The Colors of Age
    entries:
    - A faerie dragon's scales change hue as it ages, moving through all the colors
      of the rainbow. All faerie dragons have innate spellcasting ability, gaining
      new spells as they mature.
    - Red—5 years or less
    - Orange—6–10 years
    - Yellow—11–20 years
    - Green—21–30 years
    - Blue—31–40 years
    - Indigo—41–50 years
    - Violet—51 years or more
    - A green or older faerie dragon's CR increases to 2.
  - name: Superior Invisibility
    entries:
    - As a bonus action, the dragon can magically turn {@condition invisible} until
      its {@status concentration} ends (as if {@status concentration||concentrating}
      on a spell). Any equipment the dragon wears or carries is {@condition invisible}
      with it.
