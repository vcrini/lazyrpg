    entries:
    - An animal lord represents a Forager, Hunter, or Sage (DM's choice), which determines
      certain traits in this stat block.
  - name: Legendary Resistance (4/Day)
    entries:
    - If the animal lord fails a saving throw, it can choose to succeed instead.
  - name: Lordly Presence
    entries:
    - '{@actSave wis} {@dc 20}, any enemy that starts its turn in a 30-foot {@variantrule
      Emanation [Area of Effect]|XPHB|Emanation} originating from the animal lord.
      {@actSaveFail} The target suffers one of the following effects:'
    - type: list
      style: list-hang-notitle
      items:
      - type: item
        name: Captivated (Forager Only)
        entries:
        - The target has the {@condition Charmed|XPHB} condition until the end of
          its next turn. While {@condition Charmed|XPHB}, the target has the {@condition
          Incapacitated|XPHB} condition.
      - type: item
        name: Fearful (Hunter Only)
        entries:
        - The target has the {@condition Frightened|XPHB} condition until the end
          of its next turn.
      - type: item
        name: Mired (Sage Only)
        entries:
        - The target takes 10 ({@damage 3d6}) Psychic damage, and the target is magically
          bewildered until the end of its next turn. While bewildered, the target
          subtracts {@dice 1d4} from its saving throws.
