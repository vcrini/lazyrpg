    - will
  trait:
  - name: Earth Glide
    entries:
    - The cataclysm can burrow through nonmagical, unworked earth and stone. While
      doing so, the cataclysm doesn't disturb the material it moves through.
  - name: Legendary Resistance (4/Day)
    entries:
    - If the cataclysm fails a saving throw, it can choose to succeed instead.
  - name: Siege Monster
    entries:
    - The cataclysm deals double damage to objects and structures.
  action:
  - name: Multiattack
    entries:
    - The cataclysm makes two Elemental Burst attacks.
  - name: Elemental Burst
    entries:
    - '{@atkr m,r} {@hit 15}, reach 30 ft. or range 150 ft. {@h}25 ({@damage 5d6 +
      8}) damage of a type chosen by the cataclysm: Acid, Cold, Fire, Lightning, or
      Thunder.'
  - name: Cataclysmic Event {@recharge 4}
    entries:
    - 'The cataclysm creates one of the following effects at random (roll {@dice 1d4}):'
    - type: list
      style: list-hang-notitle
      items:
      - type: item
        name: '1: Clinging Flames'
        entries:
        - '{@actSave dex} {@dc 23}, each creature in a 60-foot-radius {@variantrule
          Sphere [Area of Effect]|XPHB|Sphere} centered on a point the cataclysm can
          see within 150 feet. {@actSaveFail} 45 ({@damage 13d6}) Fire damage. {@actSaveSuccess}
          Half damage. {@actSaveSuccessOrFail} The target starts {@hazard burning|XPHB}.'
      - type: item
        name: '2: Freezing Waves'
        entries:
        - '{@actSave str} {@dc 23}, each creature in a 90-foot {@variantrule Cone
          [Area of Effect]|XPHB|Cone}. {@actSaveFail} 22 ({@damage 5d8}) Bludgeoning
          damage plus 22 ({@damage 5d8}) Cold damage, and the target has the {@condition
          Prone|XPHB} condition. {@actSaveSuccess} Half damage only. {@actSaveSuccessOrFail}
          The target''s {@variantrule Speed|XPHB} is reduced to 0 until the end of
          its next turn.'
      - type: item
        name: '3: Raging Storm'
        entries:
        - A storm cloud fills a 60-foot-radius {@variantrule Sphere [Area of Effect]|XPHB|Sphere}
          centered on a point the cataclysm can see within 150 feet. The cloud lasts
          for 1 minute or until the cataclysm uses Cataclysmic Event again. Creatures
          entirely in the cloud have the {@condition Blinded|XPHB} and {@condition
          Deafened|XPHB} conditions and can't cast spells with a Verbal component.
          {@actSave dex} {@dc 23}, each creature that enters the cloud for the first
          time on a turn or starts its turn there. {@actSaveFail} 18 ({@damage 4d8})
          Lightning damage plus 18 ({@damage 4d8}) Thunder damage. {@actSaveSuccess}
          Half damage.
      - type: item
        name: '4: Swallowing Earth'
        entries:
        - '{@actSave str} {@dc 23}, each creature in a 90-foot {@variantrule Cube
          [Area of Effect]|XPHB|Cube} originating from a point on the ground within
          150 feet. {@actSaveFail} 18 ({@damage 4d8}) Bludgeoning damage plus 18 ({@damage
          4d8}) Acid damage, and the target has the {@condition Prone|XPHB} condition
          and is buried under rubble. A buried target has the {@condition Restrained|XPHB}
          condition, has {@variantrule Cover|XPHB|Total Cover}, and is suffocating.
          As an action, a buried creature or another creature within 5 feet of it
          can make a {@dc 18} Strength ({@skill Athletics|XPHB}) check. On a successful
          check, the creature is no longer buried. {@actSaveSuccess} Half damage only.'
  legendary:
  - name: Eruption
    entries:
    - The cataclysm makes one Elemental Burst attack.
  - name: Rumbling Movement
    entries:
    - The cataclysm moves up to its {@variantrule Speed|XPHB}, {@variantrule Fly Speed|XPHB},
      or {@variantrule Swim Speed|XPHB} without provoking {@action Opportunity Attack|XPHB|Opportunity
      Attacks}. Each creature within 5 feet of the cataclysm as it moves is targeted
