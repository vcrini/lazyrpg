      suffers any harm or receives a suicidal command, it can repeat the saving throw,
      ending the effect on a success. If the target successfully saves against the
      effect, or if the effect on it ends, the target is immune to this fiend's Charm
      for the next 24 hours.
    - The fiend can have only one target {@condition charmed} at a time. If it charms
      another, the effect on the previous target ends.
  - name: Draining Kiss
    entries:
    - The fiend kisses a creature {@condition charmed} by it or a willing creature.
      The target must make a {@dc 15} Constitution saving throw against this magic,
      taking 32 ({@damage 5d10 + 5}) psychic damage on a failed save, or half as much
      damage on a successful one. The target's hit point maximum is reduced by an
      amount equal to the damage taken. This reduction lasts until the target finishes
      a long rest. The target dies if this effect reduces its hit point maximum to
      0.
  - name: Etherealness
    entries:
    - The fiend magically enters the Ethereal Plane from the Material Plane, or vice
      versa.
