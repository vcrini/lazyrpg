  - name: Bound
    entries:
    - The guardian is magically bound to an amulet. While the guardian and its amulet
      are on the same plane of existence, the amulet's wearer can telepathically call
      the guardian to travel to it, and the guardian knows the distance and direction
      to the amulet. If the guardian is within 60 feet of the amulet's wearer, half
      of any damage the wearer takes (round up) is transferred to the guardian.
  - name: Regeneration
    entries:
    - The guardian regains 10 {@variantrule Hit Points|XPHB} at the start of each
      of its turns if it has at least 1 {@variantrule Hit Points|XPHB|Hit Point}.
  - name: Spell Storing
    entries:
    - A spellcaster who wears the guardian's amulet can cause the guardian to store
      one spell of level 4 or lower. To do so, the wearer must cast the spell on the
      guardian while within 5 feet of it. The spell has no effect but is stored within
      the guardian. Any previously stored spell is lost when a new spell is stored.
      The guardian can cast the spell stored with any parameters set by the original
      caster, requiring no spell components and using the caster's spellcasting ability.
      The stored spell is then lost.
