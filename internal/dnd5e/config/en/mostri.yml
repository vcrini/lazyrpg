    - 'The dragon exhales a puff of euphoria gas at one creature within 5 feet of
      it. The target must succeed on a {@dc 11} Wisdom saving throw, or for 1 minute,
      the target can''t take reactions and must roll a {@dice d6} at the start of
      each of its turns to determine its behavior during the turn:'
