      it has the {@condition Grappled|XPHB} condition (escape {@dc 17}), and it has
      the {@condition Restrained|XPHB} condition until the grapple ends.'
  bonus:
  - name: Swallow
    entries:
    - '{@actSave str} {@dc 19}, one Large or smaller creature {@condition Grappled|XPHB}
      by the remorhaz (it can have up to two creatures swallowed at a time). {@actSaveFail}
      The target is swallowed by the remorhaz, and the {@condition Grappled|XPHB}
      condition ends. A swallowed creature has the {@condition Blinded|XPHB} and {@condition
      Restrained|XPHB} conditions, it has {@variantrule Cover|XPHB|Total Cover} against
      attacks and other effects outside the remorhaz, and it takes 10 ({@damage 3d6})
      Acid damage plus 10 ({@damage 3d6}) Fire damage at the start of each of the
      remorhaz''s turns.'
    - If the remorhaz takes 30 damage or more on a single turn from a creature inside
      it, the remorhaz must succeed on a {@dc 15} Constitution saving throw at the
      end of that turn or regurgitate all swallowed creatures, each of which falls
      in a space within 5 feet of the remorhaz and has the {@condition Prone|XPHB}
      condition. If the remorhaz dies, any swallowed creature no longer has the {@condition
      Restrained|XPHB} condition and can escape from the corpse by using 15 feet of
      movement, exiting {@condition Prone|XPHB}.
