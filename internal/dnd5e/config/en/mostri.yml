      up to 120 feet to an unoccupied space it can see.
  - name: Searing Burst (Costs 2 Actions)
    entries:
    - The solar emits magical, divine energy. Each creature of its choice in a 10-foot
      radius must make a {@dc 23} Dexterity saving throw, taking 14 ({@damage 4d6})
      fire damage plus 14 ({@damage 4d6}) radiant damage on a failed save, or half
      as much damage on a successful one.
  - name: Blinding Gaze (Costs 3 Actions)
