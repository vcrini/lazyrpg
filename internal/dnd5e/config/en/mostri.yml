  - name: Fist
    entries:
    - '{@atk mw} {@hit 7} to hit, reach 5 ft., one target. {@h}11 ({@damage 2d6 +
      4}) bludgeoning damage. If the target is a creature against which the revenant
      has sworn vengeance, the target takes an extra 14 ({@damage 4d6}) bludgeoning
      damage. Instead of dealing damage, the revenant can grapple the target (escape
      {@dc 14}) provided the target is Large or smaller.'
  - name: Vengeful Glare
    entries:
    - The revenant targets one creature it can see within 30 feet of it and against
      which it has sworn vengeance. The target must make a {@dc 15} Wisdom saving
      throw. On a failure, the target is {@condition paralyzed} until the revenant
      deals damage to it, or until the end of the revenant's next turn. When the paralysis
      ends, the target is {@condition frightened} of the revenant for 1 minute. The
      {@condition frightened} target can repeat the saving throw at the end of each
      of its turns, with disadvantage if it can see the revenant, ending the {@condition
      frightened} condition on itself on a success.
  variant:
  - type: variant
    name: Revenants with Spells and Weapons
    entries:
    - Revenants that were spellcasters before they died might retain some or all of
      their spellcasting capabilities. Similarly, revenants that wore armor and wielded
      weapons in life might continue to do so.
