  trait:
  - name: Fiendish Blessing
    entries:
    - The AC of the cambion includes its Charisma bonus.
  action:
  - name: Multiattack
    entries:
    - The cambion makes two melee attacks or uses its Fire Ray twice.
  - name: Spear
    entries:
    - '{@atk mw,rw} {@hit 7} to hit, reach 5 ft. or range 20/60 ft., one target. {@h}7
      ({@damage 1d6 + 4}) piercing damage, or 8 ({@damage 1d8 + 4}) piercing damage
      if used with two hands to make a melee attack, plus 3 ({@damage 1d6}) fire damage.'
  - name: Fire Ray
    entries:
    - '{@atk rs} {@hit 7} to hit, range 120 ft., one target. {@h}10 ({@damage 3d6})
      fire damage.'
  - name: Fiendish Charm
    entries:
    - One humanoid the cambion can see within 30 feet of it must succeed on a {@dc
      14} Wisdom saving throw or be magically {@condition charmed} for 1 day. The
      {@condition charmed} target obeys the cambion's spoken commands. If the target
      suffers any harm from the cambion or another creature or receives a suicidal
      command from the cambion, the target can repeat the saving throw, ending the
      effect on itself on a success. If a target's saving throw is successful, or
      if the effect ends for it, the creature is immune to the cambion's Fiendish
      Charm for the next 24 hours.
  variant:
  - type: variant
    name: Demonic Cambions
    entries:
    - Few demons consort with mortals, and those with the charm or desire to usually
      grant their cambion children the Fiendish Charm ability. Cultists of Baphomet
      and Orcus can also use foul rituals to infuse their master's strength into a
      young or unborn child, yielding a cult champion who can wield special abilities;
      a cambion linked to Orcus replaces Fiendish Charm with Spawn of the Grave, and
      one linked to Baphomet replaces it with Horned One's Call.
    - type: entries
      name: Horned One's Call
      entries:
      - When the cambion targets only one creature with the attacks of its Multiattack,
        it can choose one ally it can see within 30 feet. That ally can use its reaction
        to make one melee attack against a target of its choice.
    - type: entries
      name: Spawn of the Grave
      entries:
      - At the end of each of the cambion's turns, each undead of its choice that
        it can see within 30 feet gains 10 temporary hit points, provided the cambion
        isn't {@condition incapacitated}.
      - In addition, this cambion can use its Innate Spellcasting ability to cast
        {@spell animate dead} three times per day.
    source: MTF
    page: 32
  - type: variant
    name: Infernal Cambions
    entries:
    - Some devils grant a unique ability to their spawn that replaces the cambion's
      Fiendish Charm trait; Zariel and Geryon have a penchant for spawning cambions
      to serve as war leaders among their followers. The two of them grant the Fury
      of the Nine ability in place of Fiendish Charm.
    - type: entries
      name: Fury of the Nine
      entries:
      - As a bonus action, the cambion chooses another creature that can see or hear
        it within 120 feet. That creature gains advantage on all attack rolls and
        saving throws for the next minute or until the cambion uses this ability again.
    source: MTF
    page: 21
