  - name: Distress Spores
    entries:
    - When the myconid takes damage, all other myconids within 240 feet of it can
      sense its pain.
  - name: Sun Sickness
    entries:
    - While in sunlight, the myconid has disadvantage on ability checks, attack rolls,
      and saving throws. The myconid dies if it spends more than 1 hour in direct
      sunlight.
  action:
  - name: Fist
    entries:
    - '{@atk mw} {@hit 2} to hit, reach 5 ft., one target. {@h}5 ({@damage 2d4}) bludgeoning
      damage plus 5 ({@damage 2d4}) poison damage.'
  - name: Pacifying Spores (3/Day)
    entries:
    - The myconid ejects spores at one creature it can see within 5 feet of it. The
      target must succeed on a {@dc 11} Constitution saving throw or be {@condition
      stunned} for 1 minute. The target can repeat the saving throw at the end of
      each of its turns, ending the effect on itself on a success.
  - name: Rapport Spores
    entries:
    - A 20-foot radius of spores extends from the myconid. These spores can go around
      corners and affect only creatures with an Intelligence of 2 or higher that aren't
      undead, constructs, or elementals. Affected creatures can communicate telepathically
      with one another while they are within 30 feet of each other. The effect lasts
      for 1 hour.
  variant:
  - type: variant
    name: Zuggtomoy's Empowerment
    entries:
    - Myconids that embrace {@creature Zuggtmoy|MTF} can develop new, more destructive
      kinds of spores. Myconid adults can have two of the following spore effects.
    - type: entries
      name: Caustic Spores (1/Day)
      entries:
      - The myconid releases spores in a 30-foot cone. Each creature inside the cone
        must succeed on a {@dc 11} Dexterity saving throw or take 3 ({@damage 1d6})
        acid damage at the start of each of the myconid's turns. A creature can repeat
        the saving throw at the end of its turn, ending the effect on itself on a
        success. The save DC is 8 + the myconid's Constitution modifier + the myconid's
        proficiency bonus.
    - type: entries
      name: Infestation Spores (1/Day)
      entries:
      - The myconid releases spores that burst out in a cloud that fills a 10-foot-radius
        sphere centered on it, and the cloud lingers for 1 minute. Any flesh-and-blood
        creature in the cloud when it appears, or that enters it later, must make
        a {@dc 11} Constitution saving throw. The save DC is 8 + the myconid's Constitution
        modifier + the myconid's proficiency bonus. On a successful save, the creature
        can't be infected by these spores for 24 hours. On a failed save, the creature
        is infected with a disease called the spores of Zuggtmoy) and also gains a
        random form of indefinite madness (determined by rolling on the Madness of
        {@creature Zuggtmoy|MTF} table) that lasts until the creature is cured of
        the disease or dies. While infected in this way, the creature can't be reinfected,
        and it must repeat the saving throw at the end of every 24 hours, ending the
        infection on a success. On a failure, the infected creature's body is slowly
        taken over by fungal growth, and after three such failed saves, the creature
        dies and is reanimated as a spore servant if it's a humanoid or a Large or
        smaller beast.
    - type: entries
      name: Euphoria Spores (1/Day)
      entries:
      - The myconid releases a cloud of spores in a 20-foot-radius sphere centered
        on itself. Other creatures in that area must each succeed on a {@dc 11} Constitution
        saving throw or become {@condition poisoned} for 1 minute. The save DC is
        8 + the myconid's Constitution modifier + the myconid's proficiency bonus.
        A creature can repeat the saving throw at the end of each of its turns, ending
        the effect early on itself on a success. When the effect ends on it, the creature
        gains one level of {@condition exhaustion}.
