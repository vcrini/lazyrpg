      turn with 0 hit points and doesn't regenerate.
  - name: Rejuvenation
    entries:
    - When the revenant's body is destroyed, its soul lingers. After 24 hours, the
      soul inhabits and animates another humanoid corpse on the same plane of existence
      and regains all its hit points. While the soul is bodiless, a {@spell wish}
      spell can be used to force the soul to go to the afterlife and not return.
  - name: Turn Immunity
    entries:
    - The revenant is immune to effects that turn undead.
  - name: Vengeful Tracker
    entries:
    - The revenant knows the distance to and direction of any creature against which
      it seeks revenge, even if the creature and the revenant are on different planes
      of existence. If the creature being tracked by the revenant dies, the revenant
      knows.
  action:
  - name: Multiattack
    entries:
