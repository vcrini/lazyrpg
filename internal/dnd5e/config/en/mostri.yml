  trait:
  - name: Avoidance
    entries:
    - If the demilich is subjected to an effect that allows it to make a saving throw
      to take only half damage, it instead takes no damage if it succeeds on the saving
      throw, and only half damage if it fails.
  - name: Legendary Resistance (3/Day)
    entries:
    - If the demilich fails a saving throw, it can choose to succeed instead.
  - name: Turn Immunity
    entries:
    - The demilich is immune to effects that turn undead.
  action:
  - name: Howl {@recharge 5}
    entries:
    - The demilich emits a bloodcurdling howl. Each creature within 30 feet of the
      demilich that can hear the howl must succeed on a {@dc 15} Constitution saving
      throw or drop to 0 hit points. On a successful save, the creature is {@condition
      frightened} until the end of its next turn.
  - name: Life Drain
    entries:
    - The demilich targets up to three creatures that it can see within 10 feet of
      it. Each target must succeed on a {@dc 19} Constitution saving throw or take
      21 ({@damage 6d6}) necrotic damage, and the demilich regains hit points equal
      to the total damage dealt to all targets.
  legendary:
  - name: Flight
    entries:
    - The demilich flies up to half its flying speed.
  - name: Cloud of Dust
    entries:
    - The demilich magically swirls its dusty remains. Each creature within 10 feet
      of the demilich, including around a corner, must succeed on a {@dc 15} Constitution
      saving throw or be {@condition blinded} until the end of the demilich's next
      turn. A creature that succeeds on the saving throw is immune to this effect
      until the end of the demilich's next turn.
  - name: Energy Drain (Costs 2 Actions)
    entries:
    - Each creature with in 30 feet of the demilich must make a {@dc 15} Constitution
      saving throw. On a failed save, the creature's hit point maximum is magically
      reduced by 10 ({@dice 3d6}). If a creature's hit point maximum is reduced to
      0 by this effect, the creature dies. A creature's hit point maximum can be restored
      with the  {@spell greater restoration} spell or similar magic.
  - name: Vile Curse (Costs 3 Actions)
    entries:
    - The demilich targets one creature it can see within 30 feet of it. The target
      must succeed on a {@dc 15} Wisdom saving throw or be magically cursed. Until
      the curse ends, the target has disadvantage on attack rolls and saving throws.
      The target can repeat the saving throw at the end of each of its turns, ending
      the curse on a success.
  legendaryGroup:
    name: Demilich
    source: MM
  variant:
  - type: inset
    name: Acererak and His Disciples
    entries:
    - The transformation into a demilich isn't a bitter end for all liches that experience
      it. Made as a conscious choice, the path of the demilich becomes the next step
      in a dark evolution. The lich Acererak—a powerful wizard and demonologist and
      the infamous master of the Tomb of Horrors—anticipated his own transformation,
      preparing for it by setting enchanted gemstones into his skull's eye sockets
      and teeth. Each of these soul gems possessed the power to capture the souls
      on which his phylactery would feed.
    - Acererak abandoned his physical body, accepting that it would molder and dissolve
      to dust while he traveled the planes as a disembodied consciousness. If the
      skull that was his last physical remains was ever disturbed, its gems would
      claim the souls of the insolent intruders to his tomb, magically transferring
      them to his phylactery.
    - Liches who follow Acererak's path believe that by becoming free of their bodies,
      they can continue their quest for power beyond the mortal world. As their patron
      did, they secure their remains within well-guarded vaults, using soul gems to
      maintain their phylacteries and destroy the adventurers who disturb their lairs.
    - Acererak or another demilich like him has a challenge rating of 21 (33,000 XP),
      or 23 (50,000 XP) in its lair, and gains the following additional action option.
    - type: entries
      name: Trap Soul
      entries:
      - The demilich targets one creature that it can see within 30 feet of it. The
        target must make a {@dc 19} Charisma saving throw. On a failed save, the target's
        soul is magically trapped inside one of the demilich's gems. While the soul
        is trapped, the target's body and all the equipment it is carrying cease to
        exist. On a successful save, the target takes 24 ({@damage 7d6}) necrotic
        damage, and if this damage reduces the target to 0 hit points, its soul is
        trapped as if it failed the saving throw. A soul trapped in a gem for 24 hours
        is devoured and ceases to exist.
      - If the demilich drops to 0 hit points, it is destroyed and turns to powder,
        leaving behind its gems. Crushing a gem releases any soul trapped within,
        at which point the target's body re-forms in an unoccupied space nearest to
        the gem and in the same state as when it was trapped.
    token:
      name: Acererak
      source: MM
      page: 49
