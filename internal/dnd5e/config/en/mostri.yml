      - '{@spell invisibility}'
      - '{@spell plane shift}'
    ability: cha
  trait:
  - name: Amphibious
    entries:
    - The marid can breathe air and water.
  - name: Elemental Demise
    entries:
    - If the marid dies, its body disintegrates into a burst of water and foam, leaving
      behind only equipment the marid was wearing or carrying.
  action:
  - name: Multiattack
    entries:
    - The marid makes two trident attacks.
  - name: Trident
    entries:
    - '{@atk mw,rw} {@hit 10} to hit, reach 5 ft. or range 20/60 ft., one target.
      {@h}13 ({@damage 2d6 + 6}) piercing damage, or 15 ({@damage 2d8 + 6}) piercing
      damage if used with two hands to make a melee attack.'
  - name: Water Jet
    entries:
    - The marid magically shoots water in a 60-foot line that is 5 feet wide. Each
      creature in that line must make a {@dc 16} Dexterity saving throw. On a failure,
      a target takes 21 ({@damage 6d6}) bludgeoning damage and, if it is Huge or smaller,
      is pushed up to 20 feet away from the marid and knocked {@condition prone}.
      On a success, a target takes half the bludgeoning damage, but is neither pushed
      nor knocked {@condition prone}.
  variant:
  - type: variant
    name: Genie Powers
    entries:
    - Genies have a variety of magical capabilities, including spells. A few have
      even greater powers that allow them to alter their appearance or the nature
      of reality.
    - type: entries
      name: Disguises
      entries:
      - Some genies can veil themselves in illusion to pass as other similarly shaped
        creatures. Such genies can innately cast the {@spell disguise self} spell
        at will, often with a longer duration than is normal for that spell. Mightier
        genies can cast the {@spell true polymorph} spell one to three times per day,
        possibly with a longer duration than normal. Such genies can change only their
        own shape, but a rare few can use the spell on other creatures and objects
        as well.
    - type: entries
      name: Wishes
      entries:
      - The genie power to grant wishes is legendary among mortals. Only the most
        potent genies, such as those among the nobility, can do so. A particular genie
        that has this power can grant one to three wishes to a creature that isn't
        a genie. Once a genie has granted its limit of wishes, it can't grant wishes
        again for some amount of time (usually 1 year), and cosmic law dictates that
        the same genie can expend its limit of wishes on a specific creature only
        once in that creature's existence.
      - To be granted a wish, a creature within 60 feet of the genie states a desired
        effect to it. The genie can then cast the {@spell wish} spell on the creature's
        behalf to bring about the effect. Depending on the genie's nature, the genie
        might try to pervert the intent of the wish by exploiting the wish's poor
        wording. The perversion of the wording is usually crafted to be to the genie's
        benefit.
