          and the target has the {@condition Poisoned|XPHB} condition until the end
          of its next turn. While {@condition Poisoned|XPHB}, the target can''t regain
          {@variantrule Hit Points|XPHB}. {@actSaveSuccess} Half damage only.'
      - type: item
        name: '6: Telekinetic Ray'
        entries:
        - '{@actSave str} {@dc 17} (the target succeeds automatically if it is Gargantuan).
          {@actSaveFail} The death tyrant moves the target up to 30 feet in any direction.
          The target has the {@condition Restrained|XPHB} condition until the start
          of the death tyrant''s next turn or until the death tyrant has the {@condition
          Incapacitated|XPHB} condition. The death tyrant can also exert fine control
          on objects with this ray, such as manipulating a tool or opening a door
          or container.'
      - type: item
        name: '7: Sleep Ray'
        entries:
        - '{@actSave wis} {@dc 17} (the target succeeds automatically if it is a Construct
          or an Undead). {@actSaveFail} The target has the {@condition Unconscious|XPHB}
          condition for 1 minute. The condition ends if the target takes damage or
          a creature within 5 feet of it takes an action to wake it.'
      - type: item
        name: '8: Petrification Ray'
        entries:
        - '{@actSave con} {@dc 17}. {@actSaveFail 1} The target has the {@condition
          Restrained|XPHB} condition and repeats the save at the end of its next turn
          if it is still {@condition Restrained|XPHB}, ending the effect on itself
          on a success. {@actSaveFail 2} The target has the {@condition Petrified|XPHB}
          condition instead of the {@condition Restrained|XPHB} condition.'
      - type: item
        name: '9: Disintegration Ray'
        entries:
        - '{@actSave dex} {@dc 17}. {@actSaveFail} 36 ({@damage 8d8}) Force damage.
          If the target is a nonmagical object or a creation of magical force, a 10-foot
          {@variantrule Cube [Area of Effect]|XPHB|Cube} of it disintegrates into
          dust. {@actSaveSuccess} Half damage. {@actSaveSuccessOrFail} If the target
          is a creature and this damage reduces it to 0 {@variantrule Hit Points|XPHB},
          it disintegrates into dust.'
      - type: item
        name: '10: Death Ray'
        entries:
        - '{@actSave dex} {@dc 17}. {@actSaveFail} 55 ({@damage 10d10}) Necrotic damage.
          {@actSaveSuccess} Half damage. {@actSaveSuccessOrFail} The target dies if
          the ray reduces it to 0 {@variantrule Hit Points|XPHB}.'
