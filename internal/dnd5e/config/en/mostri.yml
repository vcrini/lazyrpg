      If the target is a Large or smaller creature, it has the {@condition Prone|XPHB}
      condition.'
  - name: Earth Burst
    entries:
    - '{@atkr r} {@hit 10}, range 120 ft. {@h}15 ({@damage 2d8 + 6}) Bludgeoning damage.
