  - name: Legendary Resistance (3/Day, or 4/Day in Lair)
    entries:
    - If the dracolich fails a saving throw, it can choose to succeed instead.
  - name: Life Suppression
    entries:
    - Creatures within 60 feet of the dracolich can't regain {@variantrule Hit Points|XPHB}.
  - name: Magic Resistance
    entries:
    - The dracolich has {@variantrule Advantage|XPHB} on saving throws against spells
      and other magical effects.
  - name: Soul Gem
    entries:
    - The dracolich has a magical gem. If the dracolich is destroyed while the gem
      is on the same plane of existence as it, the dracolich gains a new body in {@dice
      1d20} days, regaining all its {@variantrule Hit Points|XPHB} and appearing within
      5 feet of the gem.
    - The gem is a Tiny object that has AC 20; HP 50; and {@variantrule Immunity|XPHB}
      to Necrotic, Poison, and Psychic damage. The gem regains all its {@variantrule
      Hit Points|XPHB} at the end of every turn, but it turns to dust if reduced to
      0 {@variantrule Hit Points|XPHB}. If the gem is destroyed, the dracolich can
      create a new one by completing an 8-hour ritual using a gem worth 1,000+ GP
      and by expending 5,000 GP, which the ritual consumes.
  action:
  - name: Multiattack
    entries:
    - The dracolich makes three Rend attacks. It can replace one attack with a use
      of Spellcasting to cast {@spell Ray of Sickness|XPHB} (level 2 version).
  - name: Rend
    entries:
    - '{@atkr m} {@hit 13}, reach 10 ft. {@h}18 ({@damage 2d10 + 7}) Slashing damage
      plus 4 ({@damage 1d8}) Necrotic damage.'
  - name: Necrotic Breath {@recharge 5}
    entries:
    - '{@actSave con} {@dc 20}, each creature in a 60-foot {@variantrule Cone [Area
      of Effect]|XPHB|Cone}. {@actSaveFail} 52 ({@damage 8d12}) Necrotic damage. {@actSaveSuccess}
      Half damage.'
  legendaryActionsLair: 4
  legendary:
  - name: Pounce
    entries:
    - The dracolich moves up to half its {@variantrule Speed|XPHB}, and it makes one
      Rend attack.
  - name: Sickening Ray
    entries:
    - The dracolich uses Spellcasting to cast {@spell Ray of Sickness|XPHB} (level
      2 version). The dracolich can't take this action again until the start of its
      next turn.
  - name: Terrifying Presence
    entries:
    - '{@actSave wis} {@dc 19}, each creature in a 30-foot {@variantrule Emanation
