  trait:
  - name: Earth Glide
    entries:
    - The dao can burrow through nonmagical, unworked earth and stone. While doing
      so, the dao doesn't disturb the material it moves through.
  - name: Elemental Restoration
    entries:
    - If the dao dies outside the Elemental Plane of Earth, its body dissolves into
      dirt, and it gains a new body in {@dice 1d4} days, reviving with all its {@variantrule
      Hit Points|XPHB} somewhere on the Plane of Earth.
  - name: Magic Resistance
    entries:
    - The dao has {@variantrule Advantage|XPHB} on saving throws against spells and
      other magical effects.
  - name: Wishes
    entries:
    - The dao has a 30 percent chance of knowing the {@spell Wish|XPHB} spell. If
      the dao knows it, the dao can cast it only on behalf of a non-genie creature
      who communicates a wish in a way the dao can understand. If the dao casts the
      spell for the creature, the dao suffers none of the spell's stress. Once the
      dao has cast it three times, the dao can't do so again for 365 days.
