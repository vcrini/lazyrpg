      it can see within 120 feet of itself (roll {@dice 1d10}; reroll if the beholder
      has already used that ray during this turn):'
    - type: list
      style: list-hang-notitle
      items:
      - type: item
        name: '1: Charm Ray'
        entries:
        - '{@actSave wis} {@dc 16}. {@actSaveFail} 13 ({@damage 3d8}) Psychic damage,
          and the target has the {@condition Charmed|XPHB} condition for 1 hour or
          until it takes damage. {@actSaveSuccess} Half damage only.'
      - type: item
        name: '2: Paralyzing Ray'
        entries:
        - '{@actSave con} {@dc 16}. {@actSaveFail} The target has the {@condition
          Paralyzed|XPHB} condition and repeats the save at the end of each of its
          turns, ending the effect on itself on a success. After 1 minute, it succeeds
          automatically.'
      - type: item
        name: '3: Fear Ray'
        entries:
        - '{@actSave wis} {@dc 16}. {@actSaveFail} 14 ({@damage 4d6}) Psychic damage,
          and the target has the {@condition Frightened|XPHB} condition until the
          end of its next turn. {@actSaveSuccess} Half damage only.'
      - type: item
        name: '4: Slowing Ray'
        entries:
        - '{@actSave con} {@dc 16}. {@actSaveFail} 18 ({@damage 4d8}) Necrotic damage.
          Until the end of the target''s next turn, the target''s {@variantrule Speed|XPHB}
          is halved; the target can''t take Reactions; and it can take either an action
          or a {@variantrule Bonus Action|XPHB} on its turn, not both. {@actSaveSuccess}
          Half damage only.'
      - type: item
        name: '5: Enervation Ray'
        entries:
        - '{@actSave con} {@dc 16}. {@actSaveFail} 13 ({@damage 3d8}) Poison damage,
          and the target has the {@condition Poisoned|XPHB} condition until the end
          of its next turn. While {@condition Poisoned|XPHB}, the target can''t regain
          {@variantrule Hit Points|XPHB}. {@actSaveSuccess} Half damage only.'
      - type: item
        name: '6: Telekinetic Ray'
        entries:
        - '{@actSave str} {@dc 16} (the target succeeds automatically if it is Gargantuan).
          {@actSaveFail} The beholder moves the target up to 30 feet in any direction.
          The target has the {@condition Restrained|XPHB} condition until the start
          of the beholder''s next turn or until the beholder has the {@condition Incapacitated|XPHB}
          condition. The beholder can also exert fine control on objects with this
          ray, such as manipulating a tool or opening a door or container.'
      - type: item
        name: '7: Sleep Ray'
        entries:
        - '{@actSave wis} {@dc 16} (the target succeeds automatically if it is a Construct
          or an Undead). {@actSaveFail} The target has the {@condition Unconscious|XPHB}
          condition for 1 minute. The condition ends if the target takes damage or
          a creature within 5 feet of it takes an action to wake it.'
      - type: item
        name: '8: Petrification Ray'
        entries:
        - '{@actSave con} {@dc 16}. {@actSaveFail 1} The target has the {@condition
          Restrained|XPHB} condition and repeats the save at the end of its next turn
          if it is still {@condition Restrained|XPHB}, ending the effect on itself
          on a success. {@actSaveFail 2} The target has the {@condition Petrified|XPHB}
          condition instead of the {@condition Restrained|XPHB} condition.'
      - type: item
        name: '9: Disintegration Ray'
        entries:
        - '{@actSave dex} {@dc 16}. {@actSaveFail} 36 ({@damage 8d8}) Force damage.
          If the target is a nonmagical object or a creation of magical force, a 10-foot
          {@variantrule Cube [Area of Effect]|XPHB|Cube} of it disintegrates into
          dust. {@actSaveSuccess} Half damage. {@actSaveSuccessOrFail} If the target
          is a creature and this damage reduces it to 0 {@variantrule Hit Points|XPHB},
          it disintegrates into dust.'
      - type: item
        name: '10: Death Ray'
        entries:
        - '{@actSave dex} {@dc 16}. {@actSaveFail} 55 ({@damage 10d10}) Necrotic damage.
          {@actSaveSuccess} Half damage. {@actSaveSuccessOrFail} The target dies if
          the ray reduces it to 0 {@variantrule Hit Points|XPHB}.'
