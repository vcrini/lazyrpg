      one of ten tentacles, and it has the {@condition Restrained|XPHB} condition
      until the grapple ends.'
  - name: Fling
    entries:
    - The kraken throws a Large or smaller creature {@condition Grappled|XPHB} by
      it to a space it can see within 60 feet of itself that isn't in the air. {@actSave
      dex} {@dc 25}, the creature thrown and each creature in the destination space.
      {@actSaveFail} 18 ({@damage 4d8}) Bludgeoning damage, and the target has the
      {@condition Prone|XPHB} condition. {@actSaveSuccess} Half damage only.
  - name: Lightning Strike
    entries:
