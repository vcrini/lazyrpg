    entries:
    - The slaad has advantage on saving throws against spells and other magical effects.
  - name: Regeneration
    entries:
    - The slaad regains 10 hit points at the start of its turn if it has at least
      1 hit point.
  action:
  - name: Multiattack
    entries:
    - 'The slaad makes three attacks: one with its bite and two with its claws.'
  - name: Bite
    entries:
    - '{@atk mw} {@hit 6} to hit, reach 5 ft., one target. {@h}8 ({@damage 2d4 + 3})
      piercing damage.'
  - name: Claw
    entries:
    - '{@atk mw} {@hit 6} to hit, reach 5 ft., one target. {@h}7 ({@damage 1d8 + 3})
      piercing damage. If the target is a humanoid, it must succeed on a {@dc 14}
      Constitution saving throw or be infected with a disease—a minuscule slaad egg.'
    - A humanoid host can carry only one slaad egg to term at a time. Over three months,
      the egg moves to the chest cavity, gestates, and forms a {@creature slaad tadpole}.
      In the 24-hour period before giving birth, the host starts to feel unwell, its
      speed is halved, and it has disadvantage on attack rolls, ability checks, and
      saving throws. At birth, the tadpole chews its way through vital organs and
      out of the host's chest in 1 round, killing the host in the process.
    - If the disease is cured before the tadpole's emergence, the unborn slaad is
      disintegrated.
  variant:
  - type: variant
    name: Control Gem
    entries:
    - Implanted in the slaad's brain is a magic control gem. The slaad must obey whoever
      possesses the gem and is immune to being {@condition charmed} while so controlled.
    - Certain spells can be used to acquire the gem. If the slaad fails its saving
      throw against {@spell imprisonment}, the spell can transfer the gem to the spellcaster's
      open hand, instead of imprisoning the slaad. A {@spell wish} spell, if cast
      in the slaad's presence, can be worded to acquire the gem.
    - A {@spell greater restoration} spell cast on the slaad destroys the gem without
      harming the slaad.
    - Someone who is proficient in Wisdom ({@skill Medicine}) can remove the gem from
      an {@condition incapacitated} slaad. Each try requires 1 minute of uninterrupted
      work and a successful {@dc 20} Wisdom ({@skill Medicine}) check. Each failed
      attempt deals 22 ({@damage 4d10}) psychic damage to the slaad.
