    - Unless the death knight is {@condition incapacitated}, it and undead creatures
      of its choice within 60 feet of it have advantage on saving throws against features
      that turn undead.
  action:
  - name: Multiattack
    entries:
    - The death knight makes three longsword attacks.
  - name: Longsword
    entries:
    - '{@atk mw} {@hit 11} to hit, reach 5 ft., one target. {@h}9 ({@damage 1d8 +
      5}) slashing damage, or 10 ({@damage 1d10 + 5}) slashing damage if used with
      two hands, plus 18 ({@damage 4d8}) necrotic damage.'
  - name: Hellfire Orb (1/Day)
    entries:
    - The death knight hurls a magical ball of fire that explodes at a point it can
      see within 120 feet of it. Each creature in a 20-foot-radius sphere centered
      on that point must make a {@dc 18} Dexterity saving throw. The sphere spreads
      around corners. A creature takes 35 ({@damage 10d6}) fire damage and 35 ({@damage
      10d6}) necrotic damage on a failed save, or half as much damage on a successful
      one.
  reaction:
  - name: Parry
    entries:
    - The death knight adds 6 to its AC against one melee attack that would hit it.
      To do so, the death knight must see the attacker and be wielding a melee weapon.
