    entries:
    - '{@atk mw} {@hit 4} to hit, reach 5 ft., one creature. {@h}4 ({@damage 1d4 +
      2}) piercing damage plus 2 ({@damage 1d4}) acid damage. At the end of each of
      its turns, the target must make a {@dc 10} Constitution saving throw, taking
      2 ({@damage 1d4}) acid damage on a failure or ending the recurring acid damage
      on a success. A {@spell lesser restoration} spell cast on the target also ends
      the recurring acid damage.'
  - name: Stench Spray (1/Day)
    entries:
    - Each creature in a 15-foot cone originating from the flumph must succeed on
      a {@dc 10} Dexterity saving throw or be coated in a foul-smelling liquid. A
      coated creature exudes a horrible stench for {@dice 1d4} hours. The coated creature
      is {@condition poisoned} as long as the stench lasts, and other creatures are
      {@condition poisoned} while with in 5 feet of the coated creature. A creature
      can remove the stench on itself by using a short rest to bathe in water, alcohol,
      or vinegar.
