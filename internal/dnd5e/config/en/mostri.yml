  - name: Innate Spellcasting
    type: spellcasting
    headerEntries:
    - 'The hag''s innate spellcasting ability is Charisma (spell save {@dc 14}, {@hit
      6} to hit with spell attacks). She can innately cast the following spells, requiring
      no material components:'
    will:
    - '{@spell detect magic}'
    - '{@spell magic missile}'
    daily:
      2e:
      - '{@spell plane shift} (self only)'
      - '{@spell ray of enfeeblement}'
      - '{@spell sleep}'
    ability: cha
  trait:
  - name: Magic Resistance
    entries:
    - The hag has advantage on saving throws against spells and other magical effects.
  - name: Night Hag Items
    entries:
    - A night hag carries two very rare magic items that she must craft for herself.
      If either object is lost, the night hag will go to great lengths to retrieve
      it, as creating a new tool takes time and effort.
    - 'Heartstone: This lustrous black gem allows a night hag to become ethereal while
      it is in her possession. The touch of a heartstone also cures any disease. Crafting
      a heartstone takes 30 days.'
    - 'Soul Bag: When an evil humanoid dies as a result of a night hag''s Nightmare
      Haunting, the hag catches the soul in this black sack made of stitched flesh.
      A soul bag can hold only one evil soul at a time, and only the night hag who
      crafted the bag can catch a soul with it. Crafting a soul bag takes 7 days and
      a humanoid sacrifice (whose flesh is used to make the bag).'
  action:
  - name: Claws (Hag Form Only)
    entries:
    - '{@atk mw} {@hit 7} to hit, reach 5 ft., one target. {@h}13 ({@damage 2d8 +
      4}) slashing damage.'
  - name: Change Shape
    entries:
    - The hag magically polymorphs into a Small or Medium female humanoid, or back
      into her true form. Her statistics are the same in each form. Any equipment
      she is wearing or carrying isn't transformed. She reverts to her true form if
      she dies.
  - name: Etherealness
    entries:
    - The hag magically enters the Ethereal Plane from the Material Plane, or vice
      versa. To do so, the hag must have a heartstone in her possession.
  - name: Nightmare Haunting (1/Day)
    entries:
    - While on the Ethereal Plane, the hag magically touches a sleeping humanoid on
      the Material Plane. A {@spell protection from evil and good} spell cast on the
      target prevents this contact, as does a magic circle. As long as the contact
      persists, the target has dreadful visions. If these visions last for at least
      1 hour, the target gains no benefit from its rest, and its hit point maximum
      is reduced by 5 ({@dice 1d10}). If this effect reduces the target's hit point
      maximum to 0, the target dies, and if the target was evil, its soul is trapped
      in the hag's soul bag. The reduction to the target's hit point maximum lasts
      until removed by the  {@spell greater restoration} spell or similar magic.
  legendaryGroup:
    name: Night Hag
    source: MM
  variant:
  - type: inset
    name: Hag Covens
    entries:
    - When hags must work together, they form covens, in spite of their selfish natures.
      A coven is made up of hags of any type, all of whom are equals within the group.
      However, each of the hags continues to desire more personal power.
    - A coven consists of three hags so that any arguments between two hags can be
      settled by the third. If more than three hags ever come together, as might happen
      if two covens come into conflict, the result is usually chaos.
    - type: spellcasting
      name: Shared Spellcasting (Coven Only)
      headerEntries:
      - 'While all three members of a hag coven are within 30 feet of one another,
        they can each cast the following spells from the wizard''s spell list but
        must share the spell slots among themselves:'
      spells:
        '1':
          slots: 4
          spells:
          - '{@spell identify}'
          - '{@spell ray of sickness}'
        '2':
          slots: 3
          spells:
          - '{@spell hold person}'
          - '{@spell locate object}'
        '3':
          slots: 3
          spells:
          - '{@spell bestow curse}'
          - '{@spell counterspell}'
          - '{@spell lightning bolt}'
        '4':
          slots: 3
          spells:
          - '{@spell phantasmal killer}'
          - '{@spell polymorph}'
        '5':
          slots: 2
          spells:
          - '{@spell contact other plane}'
          - '{@spell scrying}'
        '6':
          slots: 1
          spells:
          - '{@spell eyebite}'
      footerEntries:
      - For casting these spells, each hag is a 12th-level spellcaster that uses Intelligence
        as her spellcasting ability. The spell save DC is 12 + the hag's Intelligence
        modifier, and the spell attack bonus is 4 + the hag's Intelligence modifier.
    - type: entries
      name: Hag Eye
      entries:
      - A hag coven can craft a magic item called a hag eye, which is made from a
        real eye coated in varnish and often fitted to a pendant or other wearable
        item. The hag eye is usually entrusted to a minion for safekeeping and transport.
        A hag in the coven can take an action to see what the hag eye sees if the
        hag eye is on the same plane of existence. A hag eye has AC 10, 1 hit point,
        and darkvision with a radius of 60 feet. If it is destroyed, each coven member
        takes {@damage 3d10} psychic damage and is {@condition blinded} for 24 hours.
      - A hag coven can have only one hag eye at a time, and creating a new one requires
        all three members of the coven to perform a ritual. The ritual takes 1 hour,
        and the hags can't perform it while {@condition blinded}. During the ritual,
        if the hags take any action other than performing the ritual, they must start
        over.
