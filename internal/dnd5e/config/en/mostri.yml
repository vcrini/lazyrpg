      33 ({@damage 6d10}) Lightning damage. {@actSaveSuccess} Half damage.'
  - name: Swallow
    entries:
    - '{@actSave dex} {@dc 25}, one creature {@condition Grappled|XPHB} by the kraken
      (it can have up to four creatures swallowed at a time). {@actSaveFail} 23 ({@damage
      3d8 + 10}) Piercing damage. If the target is Large or smaller, it is swallowed
      and no longer {@condition Grappled|XPHB}. A swallowed creature has the {@condition
      Restrained|XPHB} condition, has {@variantrule Cover|XPHB|Total Cover} against
      attacks and other effects outside the kraken, and takes 24 ({@damage 7d6}) Acid
      damage at the start of each of its turns.'
    - If the kraken takes 50 damage or more on a single turn from a creature inside
      it, the kraken must succeed on a {@dc 25} Constitution saving throw at the end
      of that turn or regurgitate all swallowed creatures, each of which falls in
      a space within 10 feet of the kraken with the {@condition Prone|XPHB} condition.
      If the kraken dies, any swallowed creature no longer has the {@condition Restrained|XPHB}
      condition and can escape from the corpse using 15 feet of movement, exiting
      {@condition Prone|XPHB}.
