    ability: cha
  trait:
  - name: Shapechanger
    entries:
    - The slaad can use its action to polymorph into a Small or Medium humanoid, or
      back into its true form. Its statistics, other than its size, are the same in
      each form. Any equipment it is wearing or carrying isn't transformed. It reverts
      to its true form if it dies.
  - name: Magic Resistance
    entries:
    - The slaad has advantage on saving throws against spells and other magical effects.
  - name: Magic Weapons
    entries:
    - The slaad's weapon attacks are magical.
  - name: Regeneration
    entries:
    - The slaad regains 10 hit points at the start of its turn if it has at least
      1 hit point.
  action:
  - name: Multiattack
    entries:
    - 'The slaad makes three attacks: one with its bite and two with its claws or
      greatsword.'
  - name: Bite (Slaad Form Only)
    entries:
    - '{@atk mw} {@hit 7} to hit, reach 5 ft., one target. {@h}6 ({@damage 1d6 + 3})
      piercing damage.'
  - name: Claws (Slaad Form Only)
    entries:
    - '{@atk mw} {@hit 7} to hit, reach 5 ft., one target. {@h}8 ({@damage 1d10 +
      3}) slashing damage.'
  - name: Greatsword
    entries:
    - '{@atk mw} {@hit 7} to hit, reach 5 ft., one target. {@h}10 ({@damage 2d6 +
      3}) slashing damage.'
  variant:
  - type: variant
    name: Control Gem
    entries:
    - Implanted in the slaad's brain is a magic control gem. The slaad must obey whoever
      possesses the gem and is immune to being {@condition charmed} while so controlled.
    - Certain spells can be used to acquire the gem. If the slaad fails its saving
      throw against {@spell imprisonment}, the spell can transfer the gem to the spellcaster's
      open hand, instead of imprisoning the slaad. A {@spell wish} spell, if cast
      in the slaad's presence, can be worded to acquire the gem.
    - A {@spell greater restoration} spell cast on the slaad destroys the gem without
      harming the slaad.
    - Someone who is proficient in Wisdom ({@skill Medicine}) can remove the gem from
      an {@condition incapacitated} slaad. Each try requires 1 minute of uninterrupted
      work and a successful {@dc 20} Wisdom ({@skill Medicine}) check. Each failed
      attempt deals 22 ({@damage 4d10}) psychic damage to the slaad.
    _version:
      name: Gray Slaad (Control Gem)
      addAs: trait
