      {@condition paralyzed} for 1 minute, unless it is immune to cold damage. The
      target can repeat the saving throw at the end of each of its turns, ending the
      effect on itself on a success. If the target's saving throw is successful, or
      if the effect ends on it, the target is immune to this yeti's gaze for 1 hour.
  - name: Cold Breath {@recharge}
    entries:
