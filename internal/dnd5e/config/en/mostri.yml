    type: spellcasting
    headerEntries:
    - While on the Ethereal Plane, the hag casts {@spell Dream|XPHB}, using the same
      spellcasting ability as Spellcasting. Only the hag can serve as the spell's
      messenger, and the target must be a creature the hag can see on the Material
      Plane. The spell fails and is wasted if the target is under the effect of the
      {@spell Protection from Evil and Good|XPHB} spell or within a {@spell Magic
      Circle|XPHB} spell.
    - If the target takes damage from the {@spell Dream|XPHB} spell, the target's
      {@variantrule Hit Points|XPHB|Hit Point} maximum decreases by an amount equal
      to that damage. If the spell kills the target, its soul is trapped in the hag's
      soul bag, and the target can't be raised from the dead until its soul is released.
