  - name: Vengeful Glare
    entries:
    - '{@actSave wis} {@dc 15}, one creature the revenant can see within 30 feet.
      {@actSaveFail} The target has the {@condition Frightened|XPHB} condition and
      repeats the save at the end of each of its turns, ending the effect on itself
      on a success. After 1 minute, it succeeds automatically. If the {@condition
      Frightened|XPHB} target is cursed by the revenant (see Vow of Revenge), the
      target also has the {@condition Paralyzed|XPHB} condition for the duration.'
  bonus:
  - name: Vow of Revenge (1/Day)
    entries:
    - The revenant curses one creature it can see within 30 feet of itself. The revenant
      knows the distance to and direction of the cursed target, even if it is on a
      different plane of existence. The curse ends on the target if the revenant uses
      this {@variantrule Bonus Action|XPHB} on a different creature.
