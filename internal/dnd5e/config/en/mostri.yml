      gains a new body instantly and revives with all its {@variantrule Hit Points|XPHB}
      in Gehenna.
  - name: Magic Resistance
    entries:
    - The arcanaloth has {@variantrule Advantage|XPHB} on saving throws against spells
      and other magical effects.
  - name: Soul Tome
    entries:
    - The arcanaloth has a magic tome. While holding or carrying the tome, the arcanaloth
      can use its Banishing Claw action.
    - The tome has AC 17; HP 35; and {@variantrule Immunity|XPHB} to Necrotic, Poison,
      and Psychic damage. The tome regains all its {@variantrule Hit Points|XPHB}
      at the end of every turn, but it turns to dust if reduced to 0 {@variantrule
      Hit Points|XPHB} or when the arcanaloth dies. If the tome is destroyed, the
      arcanaloth can create a new one when it finishes a {@variantrule Short Rest|XPHB|Short}
      or {@variantrule Long Rest|XPHB}.
