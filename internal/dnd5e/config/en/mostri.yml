      disappears. {@actSave dex} {@dc 20}, one creature the animal lord can see within
      120 feet. {@actSaveFail} 28 ({@damage 4d10 + 6}) Radiant damage. {@actSaveSuccess}
      Half damage. {@actSaveSuccessOrFail} One of the following effects occurs:'
