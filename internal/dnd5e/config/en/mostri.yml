  languages:
  - Auran
  cr: '11'
  spellcasting:
  - name: Innate Spellcasting
    type: spellcasting
    headerEntries:
    - 'The djinni''s innate spellcasting ability is Charisma (spell save {@dc 17},
      {@hit 9} to hit with spell attacks). It can innately cast the following spells,
      requiring no material components:'
    will:
    - '{@spell detect evil and good}'
    - '{@spell detect magic}'
    - '{@spell thunderwave}'
    daily:
      3e:
      - '{@spell create food and water} (can create wine instead of water)'
      - '{@spell tongues}'
      - '{@spell wind walk}'
      1e:
      - '{@spell conjure elemental} ({@creature air elemental} only)'
      - '{@spell creation}'
      - '{@spell gaseous form}'
      - '{@spell invisibility}'
      - '{@spell major image}'
      - '{@spell plane shift}'
    ability: cha
  trait:
  - name: Elemental Demise
    entries:
    - If the djinni dies, its body disintegrates into a warm breeze, leaving behind
      only equipment the djinni was wearing or carrying.
  action:
  - name: Multiattack
    entries:
    - The djinni makes three scimitar attacks.
  - name: Scimitar
    entries:
    - '{@atk mw} {@hit 9} to hit, reach 5 ft., one target. {@h}12 ({@damage 2d6 +
      5}) slashing damage plus 3 ({@damage 1d6}) lightning or thunder damage (djinni''s
      choice).'
  - name: Create Whirlwind
    entries:
    - A 5-foot-radius, 30-foot-tall cylinder of swirling air magically forms on a
      point the djinni can see within 120 feet of it. The whirlwind lasts as long
      as the djinni maintains {@status concentration} (as if {@status concentration||concentrating}
      on a spell). Any creature but the djinni that enters the whirlwind must succeed
      on a {@dc 18} Strength saving throw or be {@condition restrained} by it. The
      djinni can move the whirlwind up to 60 feet as an action, and creatures {@condition
      restrained} by the whirlwind move with it. The whirlwind ends if the djinni
      loses sight of it.
    - A creature can use its action to free a creature {@condition restrained} by
      the whirlwind, including itself, by succeeding on a {@dc 18} Strength check.
      If the check succeeds, the creature is no longer {@condition restrained} and
      moves to the nearest space outside the whirlwind.
  variant:
  - type: variant
    name: Genie Powers
    entries:
    - Genies have a variety of magical capabilities, including spells. A few have
      even greater powers that allow them to alter their appearance or the nature
      of reality.
    - type: entries
      name: Disguises
      entries:
      - Some genies can veil themselves in illusion to pass as other similarly shaped
        creatures. Such genies can innately cast the {@spell disguise self} spell
        at will, often with a longer duration than is normal for that spell. Mightier
        genies can cast the {@spell true polymorph} spell one to three times per day,
        possibly with a longer duration than normal. Such genies can change only their
        own shape, but a rare few can use the spell on other creatures and objects
        as well.
    - type: entries
      name: Wishes
      entries:
      - The genie power to grant wishes is legendary among mortals. Only the most
        potent genies, such as those among the nobility, can do so. A particular genie
        that has this power can grant one to three wishes to a creature that isn't
        a genie. Once a genie has granted its limit of wishes, it can't grant wishes
        again for some amount of time (usually 1 year), and cosmic law dictates that
        the same genie can expend its limit of wishes on a specific creature only
        once in that creature's existence.
      - To be granted a wish, a creature within 60 feet of the genie states a desired
        effect to it. The genie can then cast the {@spell wish} spell on the creature's
        behalf to bring about the effect. Depending on the genie's nature, the genie
        might try to pervert the intent of the wish by exploiting the wish's poor
        wording. The perversion of the wording is usually crafted to be to the genie's
        benefit.
  environment:
  - coastal
