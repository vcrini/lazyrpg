    type: spellcasting
    headerEntries:
    - The cataclysm casts the {@spell Control Weather|XPHB} spell, requiring no spell
      components and using Constitution as the spellcasting ability.
    will:
    - '{@spell Control Weather|XPHB}'
    ability: con
    displayAs: action
