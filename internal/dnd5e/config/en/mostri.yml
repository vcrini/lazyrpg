      is a creature that has 100 hit points or fewer, it must succeed on a {@dc 15}
      Constitution saving throw or die.'
  - name: Flying Sword
    entries:
    - The solar releases its greatsword to hover magically in an unoccupied space
      within 5 feet of it. If the solar can see the sword, the solar can mentally
      command it as a bonus action to fly up to 50 feet and either make one attack
      against a target or return to the solar's hands. If the hovering sword is targeted
      by any effect, the solar is considered to be holding it. The hovering sword
      falls if the solar dies.
  - name: Healing Touch (4/Day)
    entries:
    - The solar touches another creature. The target magically regains 40 ({@dice
      8d8 + 4}) hit points and is freed from any curse, disease, poison, blindness,
      or deafness.
